async function sendPushToAll(title, body) {
  try {
    const res = await fetch('/.netlify/functions/send-push', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title, body, secret:'msde2026push' })
    });
    const data = await res.json();
    return data;
  } catch(e) { return null; }
}

function AdminPanelPage({ onBack }) {
  const [tab, setTab]           = useState("online");
  const [allUsers, setAllUsers] = useState([]);
  const [onlineUsers, setOnlineUsers] = useState([]);
  const [logs, setLogs]         = useState([]);
  const [logFilter, setLogFilter] = useState("all");
  const [loading, setLoading]   = useState(true);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [syncing, setSyncing]   = useState(false);
  const [msg, setMsg]           = useState(null);

  const showMsg = (text, ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg(null),2500); };

  const fmtTime = (ts) => {
    if(!ts) return "";
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };

  const load = useCallback(async (quiet=false) => {
    try {
      if(!quiet) setLoading(true);
      const [uData, lData, pData] = await Promise.all([
        fetch(`${FIREBASE_URL}/users.json`).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/rental_logs.json`).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/presence.json`).then(r=>r.json()),
      ]);
      setAllUsers(uData ? Object.values(uData).sort((a,b)=>a.name.localeCompare(b.name,"ko")) : []);
      const lArr = lData ? Object.entries(lData).map(([id,v])=>({id,...v})).sort((a,b)=>b.at-a.at) : [];
      setLogs(lArr);
      // 90초 이내 접속자만
      const now = Date.now();
      const active = pData ? Object.values(pData).filter(p=>now-p.at<10000) : [];
      // 이름 중복 제거
      const uniqueNames = [...new Map(active.map(p=>[p.name,p])).values()];
      setOnlineUsers(uniqueNames.sort((a,b)=>a.name.localeCompare(b.name,"ko")));
    } catch(e){ console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(()=>{ load(); },[]);
  useEffect(()=>{ const id=setInterval(()=>load(true),10000); return()=>clearInterval(id); },[]);

  async function doDeleteUser(u) {
    setSyncing(true);
    try {
      await Promise.all([
        fetch(`${FIREBASE_URL}/users/${encodeURIComponent(u.name)}.json`, { method:"DELETE" }),
        fetch(`${FIREBASE_URL}/betting_users/${encodeURIComponent(u.name)}.json`, { method:"DELETE" }),
        fetch(`${FIREBASE_URL}/betting_mybets_${encodeURIComponent(u.name)}.json`, { method:"DELETE" }),
        fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(u.name)}.json`, { method:"DELETE" }),
      ]);
      await load(true);
      showMsg(`✅ ${u.name} 탈퇴 처리 완료`);
    } catch(e){ showMsg("오류가 발생했습니다.", false); }
    finally { setSyncing(false); setDeleteTarget(null); }
  }

  const typeLabel = { borrow:"대여", return:"반납", disposable:"가져가기" };
  const typeColor = { borrow:c.guitar, return:c.success, disposable:c.rental };

  if(loading) return (
    <div style={{minHeight:"100vh",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:36}}>🛡️</div><div style={{color:c.muted,fontSize:14}}>불러오는 중...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:c.bg,color:c.text,fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:60}}>
      {/* HEADER */}
      <div style={{borderBottom:`1px solid ${c.border}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:12,background:`linear-gradient(180deg,${c.surface},${c.bg})`}}>
        <button onClick={onBack} style={{background:"#e87e7e22",border:"1px solid #e87e7e44",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"#e87e7e",fontSize:13,fontWeight:600}}>← 홈</button>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>🛡️</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:"#e87e7e"}}>회원 · 로그 관리</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:c.muted}}>관리자 전용</p>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:c.bg,padding:"12px 20px 0"}}>
        <div style={{display:"flex",background:c.surface,borderRadius:10,padding:3,width:"100%",maxWidth:480,margin:"0 auto"}}>
          {[{id:"online",label:`🟢 접속중 ${onlineUsers.length}`},{id:"users",label:"👥 회원 목록"},{id:"logs",label:"📋 활동 로그"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"8px",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,transition:"all 0.2s",
                background:tab===t.id?c.surface2:"transparent",
                color:tab===t.id?"#e87e7e":c.muted,
                boxShadow:tab===t.id?"0 1px 4px #00000040":"none"}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 20px",maxWidth:480,margin:"0 auto"}}>

        {/* 접속중 */}
        {tab==="online" && (
          <div>
            <div style={{fontSize:11,color:c.muted,marginBottom:12}}>현재 {onlineUsers.length}명 접속 중 (10초 기준)</div>
            {onlineUsers.length===0
              ? <div style={{textAlign:"center",color:c.muted,fontSize:13,padding:"40px 0"}}>
                  <div style={{fontSize:32,marginBottom:8}}>🔌</div>
                  접속 중인 사용자 없음
                </div>
              : onlineUsers.map((u,i)=>(
                  <div key={i} style={{background:c.surface,border:`1px solid ${c.success}33`,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:c.success,boxShadow:`0 0 6px ${c.success}`,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:c.text}}>{u.name}</div>
                      <div style={{fontSize:11,color:c.muted}}>최근 접속: {fmtTime(u.at)}</div>
                    </div>
                  </div>
                ))
            }
          </div>
        )}

        {/* 회원 목록 */}
        {tab==="users" && (
          <div>
            <div style={{fontSize:11,color:c.muted,marginBottom:10}}>총 {allUsers.length}명 가입</div>
            {allUsers.length===0
              ? <div style={{textAlign:"center",color:c.muted,fontSize:13,padding:"40px 0"}}>가입된 회원 없음</div>
              : allUsers.map((u,i)=>(
                  <div key={i} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:36,height:36,borderRadius:10,background:"#e87e7e18",border:"1px solid #e87e7e33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:c.text}}>{u.name}</div>
                      <div style={{fontSize:11,color:c.muted}}>학번 {u.studentId} · 가입 {fmtTime(u.createdAt)}</div>
                    </div>
                    <button onClick={()=>setDeleteTarget(u)}
                      style={{padding:"5px 12px",background:"#e87e7e15",border:"1px solid #e87e7e44",borderRadius:7,color:"#e87e7e",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>
                      탈퇴
                    </button>
                  </div>
                ))
            }
          </div>
        )}

        {/* 활동 로그 */}
        {tab==="logs" && (
          <div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              {[{id:"all",label:"전체"},{id:"borrow",label:"대여"},{id:"return",label:"반납"},{id:"disposable",label:"일회용품"}].map(f=>(
                <button key={f.id} onClick={()=>setLogFilter(f.id)}
                  style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${logFilter===f.id?"#e87e7e":c.border}`,background:logFilter===f.id?"#e87e7e20":"none",color:logFilter===f.id?"#e87e7e":c.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                  {f.label}
                </button>
              ))}
            </div>
            {logs.filter(l=>logFilter==="all"||l.type===logFilter).length===0
              ? <div style={{textAlign:"center",color:c.muted,fontSize:13,padding:"40px 0"}}>로그 없음</div>
              : logs.filter(l=>logFilter==="all"||l.type===logFilter).map((log,i)=>(
                  <div key={i} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:11,fontWeight:700,color:typeColor[log.type]||c.muted,background:`${typeColor[log.type]||c.muted}15`,border:`1px solid ${typeColor[log.type]||c.muted}33`,borderRadius:20,padding:"2px 8px",flexShrink:0}}>
                      {typeLabel[log.type]||log.type}
                    </span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:c.text}}>{log.userName} <span style={{color:c.muted,fontWeight:400,fontSize:12}}>· {log.itemName}</span></div>
                      <div style={{fontSize:11,color:c.muted}}>{fmtTime(log.at)}{log.type==="return"&&log.borrowedAt?` (대여: ${fmtTime(log.borrowedAt)})`:""}</div>
                    </div>
                  </div>
                ))
            }
          </div>
        )}
      </div>

      {/* 탈퇴 확인 모달 */}
      {deleteTarget && (
        <div style={{position:"fixed",inset:0,background:"#00000088",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setDeleteTarget(null)}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:18,padding:"26px 24px 20px",maxWidth:300,width:"90%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>🗑️</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:6,textAlign:"center"}}>회원 탈퇴</div>
            <p style={{fontSize:14,color:c.muted,marginBottom:6,lineHeight:1.6,textAlign:"center"}}>
              <strong style={{color:c.text}}>{deleteTarget.name}</strong>님을 탈퇴 처리할까요?
            </p>
            <p style={{fontSize:12,color:"#e87e7e",marginBottom:18,textAlign:"center"}}>이 작업은 되돌릴 수 없습니다.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDeleteTarget(null)} style={{flex:1,padding:10,background:"none",border:`1px solid ${c.border}`,borderRadius:10,color:c.muted,cursor:"pointer",fontSize:14}}>취소</button>
              <button onClick={()=>doDeleteUser(deleteTarget)} disabled={syncing}
                style={{flex:1,padding:10,background:"#e87e7e22",border:"1px solid #e87e7e55",borderRadius:10,color:"#e87e7e",cursor:"pointer",fontSize:14,fontWeight:600}}>
                탈퇴 처리
              </button>
            </div>
          </div>
        </div>
      )}

      {msg && (
        <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:c.surface2,border:`1px solid ${msg.ok?c.success+"55":c.error+"55"}`,borderRadius:10,padding:"10px 20px",fontSize:14,color:msg.ok?c.success:c.error,zIndex:200,whiteSpace:"nowrap"}}>
          {msg.text}
        </div>
      )}
    </div>
  );
}

// ── BOARD PAGE (자유게시판) ───────────────────────────────
function SuggestPage({ onBack, user }) {
  const BOARD_COLOR = "#a0a0f0";
  const [posts, setPosts]       = useState([]);
  const [text, setText]         = useState("");
  const [pw, setPw]             = useState("");
  const [images, setImages]     = useState([]); // base64 array max 2
  const [ok, setOk]             = useState(false);
  const [err, setErr]           = useState("");
  const [syncing, setSyncing]   = useState(false);
  const [loading, setLoading]   = useState(true);

  const load = useCallback(async (quiet=false) => {
    try {
      if(!quiet) setLoading(true);
      const [notices, posts] = await Promise.all([fbGetNotices(), fbGetSuggestions()]);
      setPosts([...notices, ...posts]);
    } catch(e){ console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(()=>{ load(); },[]);

  function handleImageChange(e) {
    const files = Array.from(e.target.files).slice(0, 2 - images.length);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => setImages(prev => [...prev, ev.target.result].slice(0,2));
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  }

  const [isNoticeMode, setIsNoticeMode] = useState(false);
  const [isAnon, setIsAnon]             = useState(true);

  async function submit() {
    setErr("");
    if (!text.trim()) return setErr("내용을 입력해주세요.");
    setSyncing(true);
    try {
      const displayName = user?.isAdmin ? "관리자" : (user?.name || "익명");
      const data = { text:text.trim(), pw:pw.trim(), author:isAnon?"익명":displayName, images, createdAt:Date.now() };
      if (isNoticeMode && user?.isAdmin) {
        await fbAddNotice(data);
        // 공지 푸시 전송
        try {
          await fetch('/.netlify/functions/send-push', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ title:'📌 새 공지사항', body: text.trim().slice(0,60), secret:'msde2026push' })
          });
        } catch(e) {}
      } else {
        await fbAddSuggestion(data);
      }
      await load(true);
      setText(""); setPw(""); setImages([]); setIsAnon(false);
      setOk(true); setTimeout(()=>setOk(false), 3000);
    } catch(e) { setErr("전송 중 오류가 발생했습니다."); }
    finally { setSyncing(false); }
  }

  const inp = {width:"100%",padding:"10px 14px",background:`#1c2130`,border:`1px solid #252d3d`,borderRadius:10,color:"#eef2ff",fontSize:14,outline:"none",fontFamily:"inherit"};

  return (
    <div style={{minHeight:"100vh",background:"#0a0d14",color:"#eef2ff",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:60}}>
      {/* HEADER */}
      <div style={{borderBottom:`1px solid #252d3d`,padding:"14px 20px",display:"flex",alignItems:"center",gap:12,background:`linear-gradient(180deg,#141824,#0a0d14)`}}>
        <button onClick={onBack} style={{background:`${BOARD_COLOR}18`,border:`1px solid ${BOARD_COLOR}44`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:BOARD_COLOR,fontSize:13,fontWeight:600}}>← 홈</button>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>📝</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:BOARD_COLOR}}>자유게시판</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:"#5a6480"}}>사진은 최대 2장까지 첨부 가능해요</p>
        </div>
      </div>

      <div style={{padding:"16px 20px",maxWidth:560,margin:"0 auto"}}>
        {/* 작성 폼 */}
        <div style={{background:"#141824",border:`1px solid #252d3d`,borderRadius:14,padding:"16px",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:BOARD_COLOR}}>새 글 작성</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:"#5a6480"}}>{isAnon?"익명으로 작성":`${user?.isAdmin?"관리자":user?.name||""}으로 작성`}</span>
              <button onClick={()=>setIsAnon(v=>!v)}
                style={{padding:"4px 14px",background:isAnon?"transparent":BOARD_COLOR,border:`1.5px solid ${BOARD_COLOR}`,borderRadius:20,color:isAnon?BOARD_COLOR:"#0a0d14",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.2s"}}>
                {isAnon?"익명":"실명 ✓"}
              </button>
            </div>
          </div>
          <textarea value={text} onChange={e=>setText(e.target.value)}
            placeholder="자유롭게 글을 남겨요..." rows={4}
            style={{...inp,resize:"vertical",boxSizing:"border-box",marginBottom:10}}/>

          {/* 사진 첨부 */}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#5a6480",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>
              사진 첨부 (최대 2장)
            </label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:images.length<2?8:0}}>
              {images.map((img,i)=>(
                <div key={i} style={{position:"relative",width:80,height:80}}>
                  <img src={img} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:`1px solid #252d3d`}}/>
                  <button onClick={()=>setImages(prev=>prev.filter((_,j)=>j!==i))}
                    style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#e87e7e",border:"none",color:"white",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
                </div>
              ))}
              {images.length < 2 && (
                <label style={{width:80,height:80,borderRadius:8,border:`1px dashed #252d3d`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:4}}>
                  <span style={{fontSize:20}}>📷</span>
                  <span style={{fontSize:10,color:"#5a6480"}}>추가</span>
                  <input type="file" accept="image/*" onChange={handleImageChange} style={{display:"none"}}/>
                </label>
              )}
            </div>
          </div>

          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#5a6480",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.5px"}}>
              비밀번호 (수정·삭제용, 선택사항)
            </label>
            <input value={pw} onChange={e=>setPw(e.target.value)} type="password"
              placeholder="없으면 삭제 불가" style={inp}/>
          </div>
          {err && <div style={{background:"#e87e7e15",border:"1px solid #e87e7e44",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#e87e7e",marginBottom:10}}>⚠️ {err}</div>}
          {ok  && <div style={{background:"#7ec9a015",border:"1px solid #7ec9a044",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#7ec9a0",marginBottom:10}}>✅ 게시글이 등록되었습니다!</div>}
          {user?.isAdmin && (
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <button onClick={()=>setIsNoticeMode(v=>!v)}
                style={{padding:"5px 14px",background:isNoticeMode?"#ffd06020":"none",border:`1px solid ${isNoticeMode?"#ffd060":"#252d3d"}`,borderRadius:20,color:isNoticeMode?"#ffd060":"#5a6480",cursor:"pointer",fontSize:12,fontWeight:600}}>
                📌 {isNoticeMode?"공지글 모드 켜짐":"공지글로 올리기"}
              </button>
            </div>
          )}
          <button onClick={submit} disabled={syncing}
            style={{width:"100%",padding:13,background:syncing?"#5a6480":isNoticeMode?`linear-gradient(135deg,#ffd060,#e0a040)`:`linear-gradient(135deg,${BOARD_COLOR},${BOARD_COLOR}99)`,border:"none",borderRadius:12,color:"#0a0d14",fontSize:15,fontWeight:700,cursor:syncing?"not-allowed":"pointer"}}>
            {syncing?"등록 중...":isNoticeMode?"📌 공지글 등록":"글 등록하기"}
          </button>
        </div>

        {/* 목록 */}
        <div style={{fontSize:11,color:"#5a6480",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>
          게시글 ({posts.length}개)
        </div>
        {loading
          ? <div style={{textAlign:"center",color:"#5a6480",padding:"40px 0"}}>불러오는 중...</div>
          : posts.length===0
            ? <div style={{textAlign:"center",color:"#5a6480",fontSize:13,padding:"40px 0"}}>
                <div style={{fontSize:32,marginBottom:8}}>📝</div>
                아직 게시글이 없어요
              </div>
            : <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {(()=>{
                  const notices = posts.filter(p=>p.isNotice).sort((a,b)=>b.createdAt-a.createdAt);
                  const normal  = posts.filter(p=>!p.isNotice).sort((a,b)=>b.createdAt-a.createdAt);
                  return [...notices.map((s,i)=>(
                    <div key={`n${i}`} style={{border:`1px solid #ffd06044`,borderRadius:12,overflow:"hidden"}}>
                      <div style={{background:"#ffd06015",padding:"4px 14px",fontSize:11,fontWeight:700,color:"#ffd060"}}>📌 공지</div>
                      <div style={{padding:"0 2px"}}><SuggestionCard s={{...s,canDelete:true}} onRefresh={()=>load(true)} currentUser={user}/></div>
                    </div>
                  )), ...normal.map((s,i)=>(
                    <SuggestionCard key={`p${i}`} s={s} onRefresh={()=>load(true)} currentUser={user}/>
                  ))];
                })()}
              </div>
        }
      </div>
    </div>
  );
}

function FoodPage({ onBack }) {
  const [picked, setPicked]   = useState(null);
  const [rolling, setRolling] = useState(false);
  const [rollName, setRollName] = useState("");
  const [filter, setFilter]   = useState("전체");

  const categories = ["전체", ...new Set(RESTAURANTS.map(r => r.category))];
  const filtered = filter === "전체" ? RESTAURANTS : RESTAURANTS.filter(r => r.category === filter);

  const roll = () => {
    if (rolling) return;
    setPicked(null);
    setRolling(true);
    let count = 0;
    const total = 20 + Math.floor(Math.random() * 15);
    const interval = setInterval(() => {
      setRollName(filtered[Math.floor(Math.random() * filtered.length)]?.name);
      count++;
      if (count >= total) {
        clearInterval(interval);
        const result = filtered[Math.floor(Math.random() * filtered.length)];
        setPicked(result);
        setRolling(false);
      }
    }, 80);
  };

  return (
    <div style={{minHeight:"100vh",background:"#0a0d14",color:"#eef2ff",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:60}}>
      {/* HEADER */}
      <div style={{borderBottom:"1px solid #1e2d42",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,background:"linear-gradient(180deg,#141824,#0a0d14)"}}>
        <button onClick={onBack} style={{background:`${FOOD_COLOR}18`,border:`1px solid ${FOOD_COLOR}44`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:FOOD_COLOR,fontSize:13,fontWeight:600}}>← 홈</button>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>🍽️</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:FOOD_COLOR}}>오늘은 뭐 먹지?</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:"#5a6480"}}>공릉동 맛집 랜덤 추천</p>
        </div>
      </div>

      <div style={{padding:"20px",maxWidth:480,margin:"0 auto"}}>

        {/* 룰렛 영역 */}
        <div style={{background:"#141824",border:`1px solid ${FOOD_COLOR}33`,borderRadius:20,padding:"28px 20px",marginBottom:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${FOOD_COLOR},transparent)`}}/>

          {!picked && !rolling && (
            <div style={{padding:"20px 0"}}>
              <div style={{fontSize:48,marginBottom:12}}>🎲</div>
              <div style={{fontSize:15,color:"#5a6480",marginBottom:4}}>오늘 뭐 먹을지 고민된다면?</div>
              <div style={{fontSize:13,color:"#3a4a60"}}>버튼을 눌러서 랜덤으로 뽑아봐요</div>
            </div>
          )}

          {rolling && (
            <div style={{padding:"16px 0"}}>
              <div style={{fontSize:13,color:"#5a6480",marginBottom:8,textTransform:"uppercase",letterSpacing:"1px"}}>뽑는 중...</div>
              <div style={{fontSize:26,fontWeight:900,color:FOOD_COLOR,minHeight:40,animation:"pulse 0.2s infinite"}}>
                {rollName}
              </div>
            </div>
          )}

          {picked && !rolling && (
            <div style={{padding:"8px 0"}}>
              <div style={{fontSize:13,color:"#5a6480",marginBottom:8,textTransform:"uppercase",letterSpacing:"1px"}}>오늘의 추천 🎉</div>
              <div style={{fontSize:30,fontWeight:900,color:FOOD_COLOR,marginBottom:6}}>{picked.name}</div>
              <div style={{display:"inline-block",fontSize:12,color:FOOD_COLOR,background:`${FOOD_COLOR}15`,border:`1px solid ${FOOD_COLOR}33`,borderRadius:20,padding:"3px 12px",marginBottom:10}}>
                {picked.category}
              </div>
              <div style={{fontSize:13,color:"#8090a0",lineHeight:1.6,marginBottom:picked.link?10:0}}>{picked.desc}</div>
              {picked.link && (
                <a href={picked.link} target="_blank" rel="noopener noreferrer"
                  style={{display:"inline-block",fontSize:12,color:"#0a0d14",background:`linear-gradient(135deg,${FOOD_COLOR},#e08040)`,borderRadius:20,padding:"5px 14px",fontWeight:700,textDecoration:"none"}}>
                  📋 메뉴 보기 →
                </a>
              )}
            </div>
          )}

          <button onClick={roll} disabled={rolling}
            style={{marginTop:20,padding:"12px 36px",background:rolling?`#3a4a60`:`linear-gradient(135deg,${FOOD_COLOR},#e08040)`,border:"none",borderRadius:12,color:rolling?"#5a6480":"#0a0d14",fontSize:15,fontWeight:700,cursor:rolling?"not-allowed":"pointer",transition:"all 0.2s"}}>
            {rolling ? "뽑는 중..." : picked ? "다시 뽑기 🎲" : "랜덤 뽑기 🎲"}
          </button>
        </div>

        {/* 카테고리 필터 */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {["전체","🏫 학식","🍚 한식","🍲 국물","🍛 돈가스","🥡 중식","🍜 마라탕","🍔 패스트푸드","🍗 닭","🍜 라멘","🍝 면","🌶️ 분식","🥗 샐러드","🐟 회·해산물","🍕 피자·양식","🍣 일식"].map(cat=>(
            <button key={cat} onClick={()=>setFilter(cat)}
              style={{fontSize:11,padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===cat?FOOD_COLOR:"#1e2d42"}`,background:filter===cat?`${FOOD_COLOR}18`:"none",color:filter===cat?FOOD_COLOR:"#5a6480",cursor:"pointer",whiteSpace:"nowrap"}}>
              {cat}
            </button>
          ))}
        </div>

        {/* 전체 목록 */}
        <div style={{fontSize:11,color:"#5a6480",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>
          전체 목록 ({filtered.length}곳)
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map((r,i)=>(
            <div key={i} onClick={()=>setPicked(r)}
              style={{background:"#141824",border:`1px solid ${picked?.name===r.name?FOOD_COLOR+"66":"#1e2d42"}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=`${FOOD_COLOR}44`}
              onMouseLeave={e=>e.currentTarget.style.borderColor=picked?.name===r.name?`${FOOD_COLOR}66`:"#1e2d42"}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:picked?.name===r.name?FOOD_COLOR:"#eef2ff"}}>{r.name}</div>
                <div style={{fontSize:11,color:"#5a6480",marginTop:2}}>{r.desc}</div>
                {r.link && (
                  <a href={r.link} target="_blank" rel="noopener noreferrer"
                    onClick={e=>e.stopPropagation()}
                    style={{display:"inline-block",marginTop:6,fontSize:11,color:FOOD_COLOR,border:`1px solid ${FOOD_COLOR}44`,borderRadius:10,padding:"2px 10px",fontWeight:600,textDecoration:"none"}}>
                    📋 메뉴 보기 →
                  </a>
                )}
              </div>
              <span style={{fontSize:10,color:FOOD_COLOR,background:`${FOOD_COLOR}12`,border:`1px solid ${FOOD_COLOR}22`,borderRadius:10,padding:"2px 7px",whiteSpace:"nowrap",flexShrink:0,alignSelf:"flex-start"}}>
                {r.category}
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  ];

  const steps = os === "ios" ? iosSteps : androidSteps;
  const totalSteps = steps.length;

  const bg = "#0a0d14";
  const surface = "#141824";
  const border = "#1e2d42";
  const accent = "#00d4ff";
  const gold = "#ffd060";
  const text = "#eef2ff";
  const muted = "#5a6480";

  if (!os) return (

      <div style={{fontSize:48,marginBottom:16}}>📱</div>
      <div style={{fontSize:22,fontWeight:800,marginBottom:8,textAlign:"center"}}>앱으로 설치하기</div>
      <div style={{fontSize:14,color:muted,marginBottom:36,textAlign:"center",lineHeight:1.6}}>
        홈 화면에 아이콘을 추가하면<br/>앱처럼 편리하게 사용할 수 있어요!
      </div>
      <div style={{width:"100%",maxWidth:320,display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={()=>setOs("ios")}
          style={{padding:"16px",background:surface,border:`1px solid ${border}`,borderRadius:14,cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",transition:"all 0.2s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=accent}
          onMouseLeave={e=>e.currentTarget.style.borderColor=border}>
          <span style={{fontSize:32}}>🍎</span>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:text}}>아이폰 (iOS)</div>
            <div style={{fontSize:12,color:muted}}>Safari 브라우저 사용자</div>
          </div>
        </button>
        <button onClick={()=>setOs("android")}
          style={{padding:"16px",background:surface,border:`1px solid ${border}`,borderRadius:14,cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",transition:"all 0.2s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=accent}
          onMouseLeave={e=>e.currentTarget.style.borderColor=border}>
          <span style={{fontSize:32}}>🤖</span>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:text}}>안드로이드</div>
            <div style={{fontSize:12,color:muted}}>크롬 브라우저 사용자</div>
          </div>
        </button>
        <button onClick={onClose}
          style={{padding:"12px",background:"none",border:`1px solid ${border}`,borderRadius:12,cursor:"pointer",color:muted,fontSize:14,marginTop:4}}>
          나중에 하기
        </button>
      </div>
    </div>
  );

  const current = steps[step];
  const isLast = step === totalSteps - 1;

  return (
    <div style={{minHeight:"100vh",background:bg,color:text,fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",display:"flex",flexDirection:"column",padding:"24px"}}>
      {/* 헤더 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,paddingTop:"env(safe-area-inset-top)"}}>
        <div style={{fontSize:13,color:muted,fontWeight:600}}>{step+1} / {totalSteps}</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:muted,cursor:"pointer",fontSize:13}}>건너뛰기</button>
      </div>

      {/* 진행 바 */}
      <div style={{height:4,background:border,borderRadius:2,marginBottom:40,overflow:"hidden"}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${accent},${gold})`,borderRadius:2,width:`${((step+1)/totalSteps)*100}%`,transition:"width 0.3s ease"}}/>
      </div>

      {/* 콘텐츠 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
        <div style={{fontSize:11,color:accent,fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:12}}>
          Step {step+1}
        </div>
        <div style={{fontSize:22,fontWeight:800,color:text,marginBottom:14,lineHeight:1.3}}>
          {current.title}
        </div>
        <div style={{fontSize:15,color:muted,lineHeight:1.7,maxWidth:280,marginBottom:current.img?16:0}}>
          {current.desc}
        </div>
        {current.img && (
          <div style={{width:"100%",maxWidth:280,borderRadius:12,overflow:"hidden",border:`1px solid ${border}`,boxShadow:`0 4px 20px rgba(0,0,0,0.4)`}}>
            <img src={current.img} alt={`step${step+1}`} style={{width:"100%",display:"block"}}/>
          </div>
        )}
      </div>

      {/* 버튼 */}
      <div style={{paddingBottom:"max(24px, env(safe-area-inset-bottom))",display:"flex",gap:10}}>
        <button onClick={()=>step===0?setOs(null):setStep(s=>s-1)}
          style={{flex:1,padding:"15px",background:"none",border:`1px solid ${border}`,borderRadius:14,color:muted,fontSize:15,fontWeight:700,cursor:"pointer"}}>
          ← 이전
        </button>
        {isLast ? (
          <button onClick={onClose}
            style={{flex:2,padding:"15px",background:`linear-gradient(135deg,${accent},${gold})`,border:"none",borderRadius:14,color:bg,fontSize:15,fontWeight:800,cursor:"pointer"}}>
            🎉 완료!
          </button>
        ) : (
          <button onClick={()=>setStep(s=>s+1)}
            style={{flex:2,padding:"15px",background:`linear-gradient(135deg,${accent},#0090cc)`,border:"none",borderRadius:14,color:bg,fontSize:15,fontWeight:800,cursor:"pointer"}}>
            다음 →
          </button>
        )}
      </div>
    </div>
  );
}

        <button onClick={onBack} style={{background:`${c.piano}15`,border:`1px solid ${c.piano}33`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:c.piano,fontSize:13,fontWeight:600}}>← 홈</button>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>📦🎹🎸</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:c.piano}}>물품 / 악기 대여</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:c.muted}}>대여사업 물품 · 건반 · 기타</p>
        </div>
      </div>

      {/* SUB CARDS */}
      <div style={{padding:"28px 20px",display:"flex",flexDirection:"column",gap:14,maxWidth:480,margin:"0 auto"}}>
        {subCards.map((card,idx)=>(
          <button key={card.id} onClick={()=>onNavigate(card.id)}
            style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:18,padding:"20px 22px",cursor:"pointer",textAlign:"left",color:c.text,transition:"all 0.18s",animation:`fadeIn 0.3s ease ${idx*0.08}s both`,position:"relative",overflow:"hidden"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=card.color+"66";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.background=c.surface2;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.background=c.surface;}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${card.color},${card.color}44)`}}/>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:48,height:48,borderRadius:12,background:`${card.color}18`,border:`1px solid ${card.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
                {card.emoji}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:700,color:card.color,marginBottom:3}}>{card.title}</div>
                <div style={{fontSize:13,color:c.muted,marginBottom:5}}>{card.desc}</div>
                <div style={{fontSize:11,color:card.color+"99",background:`${card.color}12`,border:`1px solid ${card.color}22`,borderRadius:20,padding:"2px 10px",display:"inline-block"}}>{card.sub}</div>
              </div>
              <div style={{fontSize:20,color:card.color+"55"}}>›</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── MESSAGES PAGE ────────────────────────────────────────
function MessagesPage({ onBack, user }) {
  const MSG_COLOR = "#60c0f0";
  const [messages, setMessages] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  // 관리자 전송용
  const [allUsers, setAllUsers]   = useState([]);
  const [sendTarget, setSendTarget] = useState(null);
  const [sendTitle, setSendTitle] = useState("");
  const [sendText, setSendText]   = useState("");
  const [sendImg, setSendImg]     = useState("");
  const [sending, setSending]     = useState(false);
  const [sendOk, setSendOk]       = useState(false);
  const [search, setSearch]       = useState("");
  const [msgTab, setMsgTab]       = useState("inbox");
  const [userSearch, setUserSearch] = useState("");

  const load = useCallback(async () => {
    try {
      setLoading(true);
      // 모든 유저: 사용자 목록 + 받은 쪽지 로드
      const [uData, msgData] = await Promise.all([
        fetch(`${FIREBASE_URL}/users.json`).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(user.name)}.json`).then(r=>r.json()),
      ]);
      setAllUsers(uData ? Object.values(uData).sort((a,b)=>a.name.localeCompare(b.name,"ko")) : []);
      if (msgData) {
        const arr = Object.entries(msgData).map(([k,v])=>({...v,key:k})).sort((a,b)=>b.createdAt-a.createdAt);
        setMessages(arr);
      }
    } catch(e){ console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(()=>{ load(); },[]);

  async function markRead(msg) {
    if(msg.read) return;
    await fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(user.name)}/${msg.key}.json`,{
      method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({read:true})
    });
    setMessages(prev=>prev.map(m=>m.key===msg.key?{...m,read:true}:m));
  }

  async function doSend() {
    if(!sendTitle.trim()||!sendText.trim()) return;
    setSending(true);
    try {
      const from = user.isAdmin ? "관리자" : user.name;
      const msg = { from, to:sendTarget.name, title:sendTitle.trim(), text:sendText.trim(), image:sendImg, createdAt:Date.now(), read:false };
      await fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(sendTarget.name)}.json`,{
        method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(msg)
      });
      // 수신자에게 푸시 알림
      try {
        await fetch('/.netlify/functions/send-push', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            title: `✉️ ${from}님의 쪽지`,
            body: sendTitle.trim(),
            secret: 'msde2026push',
            targetUser: sendTarget.name
          })
        });
      } catch(e) {}
      setSendTitle(""); setSendText(""); setSendImg(""); setSendOk(true);
      setTimeout(()=>setSendOk(false),3000);
    } catch(e){}
    finally { setSending(false); }
  }

  const inp = {width:"100%",padding:"10px 12px",background:c.surface2,border:`1px solid ${c.border}`,borderRadius:8,color:c.text,fontSize:14,outline:"none",fontFamily:"inherit",boxSizing:"border-box"};
  const unread = messages.filter(m=>!m.read).length;

  // 쪽지 상세
  if (selected) return (
    <div style={{minHeight:"100vh",background:"#0a0d14",color:"#eef2ff",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:40}}>
      <div style={{borderBottom:"1px solid #1e2d42",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,background:"linear-gradient(180deg,#141824,#0a0d14)"}}>
        <button onClick={()=>setSelected(null)} style={{background:`${MSG_COLOR}18`,border:`1px solid ${MSG_COLOR}44`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:MSG_COLOR,fontSize:13,fontWeight:600}}>← 목록</button>
        <div style={{flex:1,fontSize:15,fontWeight:700,color:"#eef2ff"}}>{selected.title}</div>
      </div>
      <div style={{padding:"20px",maxWidth:480,margin:"0 auto"}}>
        <div style={{fontSize:12,color:"#5a6480",marginBottom:16}}>
          {selected.from} · {new Date(selected.createdAt).toLocaleDateString("ko-KR",{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})}
        </div>
        <p style={{fontSize:14,color:"#eef2ff",lineHeight:1.7,whiteSpace:"pre-wrap",marginBottom:16}}>{selected.text}</p>
        {selected.image && (
          <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #1e2d42",marginBottom:8}}>
            <img src={selected.image} style={{width:"100%",display:"block"}}/>
            <a href={selected.image} download="image.jpg"
              style={{display:"block",textAlign:"center",padding:"8px",background:"#1c2130",color:MSG_COLOR,fontSize:13,fontWeight:600,textDecoration:"none"}}>
              ⬇ 저장
            </a>
          </div>
        )}
      </div>
    </div>
  );

  // 관리자 - 쪽지 보내기 모달
  // 관리자 - 사용자 목록
  if (user.isAdmin) return (
    <div style={{minHeight:"100vh",background:"#0a0d14",color:"#eef2ff",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:60}}>
      <div style={{borderBottom:"1px solid #1e2d42",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,background:"linear-gradient(180deg,#141824,#0a0d14)"}}>
        <button onClick={onBack} style={{background:`${MSG_COLOR}18`,border:`1px solid ${MSG_COLOR}44`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:MSG_COLOR,fontSize:13,fontWeight:600}}>← 홈</button>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>✉️</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:MSG_COLOR}}>쪽지 보내기</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:"#5a6480"}}>{sendTarget ? `${sendTarget.name}에게` : "받을 사용자를 선택하세요"}</p>
        </div>
      </div>
      <div style={{padding:"16px 20px",maxWidth:480,margin:"0 auto"}}>
        {!sendTarget ? (
          <>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 이름 검색..."
              style={{width:"100%",padding:"10px 14px",background:"#141824",border:`1px solid ${MSG_COLOR}33`,borderRadius:10,color:"#eef2ff",fontSize:14,outline:"none",marginBottom:14,boxSizing:"border-box"}}/>
            {loading
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#5a6480"}}>불러오는 중...</div>
              : allUsers.filter(u=>u.name.includes(search)).length===0
                ? <div style={{textAlign:"center",padding:"40px 0",color:"#5a6480"}}>검색 결과 없음</div>
                : allUsers.filter(u=>u.name.includes(search)).map((u,i)=>(
                    <div key={i} onClick={()=>setSendTarget(u)}
                      style={{background:"#141824",border:"1px solid #1e2d42",borderRadius:12,padding:"12px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor=MSG_COLOR+"44"}
                      onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d42"}>
                      <div style={{width:36,height:36,borderRadius:10,background:`${MSG_COLOR}18`,border:`1px solid ${MSG_COLOR}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#eef2ff"}}>{u.name}</div>
                        <div style={{fontSize:11,color:"#5a6480"}}>학번 {u.studentId}</div>
                      </div>
                      <span style={{fontSize:13,color:MSG_COLOR}}>✉️ →</span>
                    </div>
                  ))
            }
          </>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
              <button onClick={()=>setSendTarget(null)} style={{background:"none",border:`1px solid ${MSG_COLOR}44`,borderRadius:8,padding:"5px 12px",cursor:"pointer",color:MSG_COLOR,fontSize:12}}>← 목록</button>
              <span style={{fontSize:14,fontWeight:700,color:"#eef2ff"}}>{sendTarget.name}에게 쪽지</span>
            </div>
            <input value={sendTitle} onChange={e=>setSendTitle(e.target.value)} placeholder="제목"
              style={inp}/>
            <textarea value={sendText} onChange={e=>setSendText(e.target.value)} placeholder="내용을 입력하세요..." rows={5}
              style={{...inp,resize:"vertical"}}/>
            <div>
              <label style={{fontSize:11,color:"#5a6480",display:"block",marginBottom:5}}>사진 첨부 (선택)</label>
              {sendImg ? (
                <div style={{position:"relative",display:"inline-block"}}>
                  <img src={sendImg} style={{width:100,height:100,objectFit:"cover",borderRadius:8,border:"1px solid #1e2d42",display:"block"}}/>
                  <button onClick={()=>setSendImg("")} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:c.error,border:"none",color:"white",fontSize:12,cursor:"pointer"}}>×</button>
                </div>
              ) : (
                <label style={{width:80,height:80,borderRadius:8,border:"1px dashed #1e2d42",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:4,background:c.surface2}}>
                  <span style={{fontSize:20}}>📎</span>
                  <span style={{fontSize:10,color:"#5a6480"}}>첨부</span>
                  <input type="file" accept="image/*" onChange={e=>{
                    const file=e.target.files[0]; if(!file) return;
                    const reader=new FileReader();
                    reader.onload=ev=>{ const img2=new window.Image(); img2.onload=()=>{ const canvas=document.createElement("canvas"); const max=600; let w=img2.width,h=img2.height; if(w>max){h=Math.round(h*max/w);w=max;} canvas.width=w;canvas.height=h; canvas.getContext("2d").drawImage(img2,0,0,w,h); setSendImg(canvas.toDataURL("image/webp",0.85)); }; img2.src=ev.target.result; };
                    reader.readAsDataURL(file); e.target.value="";
                  }} style={{display:"none"}}/>
                </label>
              )}
            </div>
            {sendOk && <div style={{background:`${c.success}15`,border:`1px solid ${c.success}44`,borderRadius:10,padding:"10px 14px",fontSize:13,color:c.success}}>✅ 쪽지를 보냈어요!</div>}
            <button onClick={doSend} disabled={sending||!sendTitle.trim()||!sendText.trim()}
              style={{padding:"13px",background:(!sendTitle.trim()||!sendText.trim()||sending)?c.muted:`linear-gradient(135deg,${MSG_COLOR},#4090c0)`,border:"none",borderRadius:12,color:"#0a0d14",fontSize:15,fontWeight:700,cursor:"pointer"}}>
              {sending?"전송 중...":"✉️ 쪽지 보내기"}
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // 일반 유저 - 받은 쪽지함 + 보내기
  return (
    <div style={{minHeight:"100vh",background:"#0a0d14",color:"#eef2ff",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:60}}>
      {/* 헤더 */}
      <div style={{borderBottom:"1px solid #1e2d42",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,background:"linear-gradient(180deg,#141824,#0a0d14)"}}>
        <button onClick={onBack} style={{background:`${MSG_COLOR}18`,border:`1px solid ${MSG_COLOR}44`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:MSG_COLOR,fontSize:13,fontWeight:600}}>← 홈</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>✉️</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:MSG_COLOR}}>쪽지함</h1>
          </div>
        </div>
        {unread > 0 && (
          <div style={{background:c.error,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700,color:"white"}}>
            {unread}
          </div>
        )}
      </div>

      {/* 탭 */}
      <div style={{display:"flex",padding:"0 20px",borderBottom:"1px solid #1e2d42",marginBottom:16}}>
        {[{id:"inbox",label:`📥 받은 쪽지${unread>0?" ("+unread+")":" "}`},{id:"send",label:"✉️ 보내기"}].map(t=>(
          <button key={t.id} onClick={()=>setMsgTab(t.id)}
            style={{background:"none",border:"none",cursor:"pointer",padding:"11px 14px 9px",fontSize:13,fontWeight:msgTab===t.id?700:400,color:msgTab===t.id?MSG_COLOR:"#5a6480",borderBottom:msgTab===t.id?`2px solid ${MSG_COLOR}`:"2px solid transparent"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"0 20px",maxWidth:480,margin:"0 auto"}}>

        {/* 받은 쪽지함 */}
        {msgTab==="inbox" && (
          loading
            ? <div style={{textAlign:"center",padding:"40px 0",color:"#5a6480"}}>불러오는 중...</div>
            : messages.length===0
              ? <div style={{textAlign:"center",padding:"60px 0",color:"#5a6480"}}>
                  <div style={{fontSize:40,marginBottom:12}}>✉️</div>
                  <div>받은 쪽지가 없어요</div>
                </div>
              : messages.map((msg,i)=>(
                  <div key={i} onClick={()=>{setSelected(msg);markRead(msg);}}
                    style={{background:"#141824",border:`1px solid ${!msg.read?MSG_COLOR+"44":"#1e2d42"}`,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer",position:"relative",overflow:"hidden"}}>
                    {!msg.read && <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${MSG_COLOR},transparent)`}}/>}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:14,fontWeight:700,color:!msg.read?MSG_COLOR:"#eef2ff"}}>{msg.title}</div>
                      {!msg.read && <span style={{fontSize:10,background:MSG_COLOR,color:"#0a0d14",borderRadius:10,padding:"2px 7px",fontWeight:700}}>NEW</span>}
                    </div>
                    <div style={{fontSize:12,color:"#5a6480"}}>
                      {msg.from} · {new Date(msg.createdAt).toLocaleDateString("ko-KR",{month:"long",day:"numeric"})}
                    </div>
                  </div>
                ))
        )}

        {/* 보내기 - 사용자 목록 */}
        {msgTab==="send" && !sendTarget && (
          <div>
            <input value={userSearch} onChange={e=>setUserSearch(e.target.value)} placeholder="🔍 이름 검색..."
              style={{width:"100%",padding:"10px 14px",background:"#141824",border:`1px solid ${MSG_COLOR}33`,borderRadius:10,color:"#eef2ff",fontSize:14,outline:"none",marginBottom:14,boxSizing:"border-box"}}/>
            {loading
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#5a6480"}}>불러오는 중...</div>
              : allUsers.filter(u=>u.name!==user.name && u.name.includes(userSearch)).length===0
                ? <div style={{textAlign:"center",padding:"40px 0",color:"#5a6480"}}>검색 결과 없음</div>
                : allUsers.filter(u=>u.name!==user.name && u.name.includes(userSearch)).map((u,i)=>(
                    <div key={i} onClick={()=>setSendTarget(u)}
                      style={{background:"#141824",border:"1px solid #1e2d42",borderRadius:12,padding:"12px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor=MSG_COLOR+"44"}
                      onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d42"}>
                      <div style={{width:36,height:36,borderRadius:10,background:`${MSG_COLOR}18`,border:`1px solid ${MSG_COLOR}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#eef2ff"}}>{u.name}</div>
                        <div style={{fontSize:11,color:"#5a6480"}}>{String(u.studentId||"").slice(0,2)}학번</div>
                      </div>
                      <span style={{fontSize:13,color:MSG_COLOR}}>✉️ →</span>
                    </div>
                  ))
            }
          </div>
        )}

        {/* 보내기 - 작성 폼 */}
        {msgTab==="send" && sendTarget && (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"10px 14px",background:"#141824",borderRadius:10,border:`1px solid ${MSG_COLOR}33`}}>
              <span style={{fontSize:14,color:"#5a6480"}}>받는 사람:</span>
              <span style={{fontSize:14,fontWeight:700,color:MSG_COLOR,flex:1}}>{sendTarget.name}</span>
              <button onClick={()=>setSendTarget(null)} style={{background:"none",border:"none",color:"#5a6480",cursor:"pointer",fontSize:12}}>변경</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input value={sendTitle} onChange={e=>setSendTitle(e.target.value)} placeholder="제목"
                style={{width:"100%",padding:"10px 12px",background:"#141824",border:"1px solid #1e2d42",borderRadius:8,color:"#eef2ff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              <textarea value={sendText} onChange={e=>setSendText(e.target.value)} placeholder="내용을 입력하세요..." rows={5}
                style={{width:"100%",padding:"10px 12px",background:"#141824",border:"1px solid #1e2d42",borderRadius:8,color:"#eef2ff",fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
              {sendImg ? (
                <div style={{position:"relative",display:"inline-block"}}>
                  <img src={sendImg} style={{width:100,height:100,objectFit:"cover",borderRadius:8,border:"1px solid #1e2d42",display:"block"}}/>
                  <button onClick={()=>setSendImg("")} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:c.error,border:"none",color:"white",fontSize:12,cursor:"pointer"}}>×</button>
                </div>
              ) : (
                <label style={{width:80,height:80,borderRadius:8,border:"1px dashed #1e2d42",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:4,background:c.surface2}}>
                  <span style={{fontSize:20}}>📎</span>
                  <span style={{fontSize:10,color:"#5a6480"}}>첨부</span>
                  <input type="file" accept="image/*" onChange={e=>{
                    const file=e.target.files[0]; if(!file) return;
                    const reader=new FileReader();
                    reader.onload=ev=>{
                      const img2=new window.Image(); img2.onload=()=>{
                        const canvas=document.createElement("canvas");
                        const max=600; let w=img2.width,h=img2.height;
                        if(w>max){h=Math.round(h*max/w);w=max;}
                        canvas.width=w;canvas.height=h;
                        canvas.getContext("2d").drawImage(img2,0,0,w,h);
                        setSendImg(canvas.toDataURL("image/webp",0.85));
                      };
                      img2.src=ev.target.result;
                    };
                    reader.readAsDataURL(file); e.target.value="";
                  }} style={{display:"none"}}/>
                </label>
              )}
              {sendOk && <div style={{background:`${c.success}15`,border:`1px solid ${c.success}44`,borderRadius:10,padding:"10px 14px",fontSize:13,color:c.success}}>✅ 쪽지를 보냈어요!</div>}
              <button onClick={doSend} disabled={sending||!sendTitle.trim()||!sendText.trim()}
                style={{padding:"13px",background:(!sendTitle.trim()||!sendText.trim()||sending)?"#3a4a60":`linear-gradient(135deg,${MSG_COLOR},#4090c0)`,border:"none",borderRadius:12,color:"#0a0d14",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                {sending?"전송 중...":"✉️ 쪽지 보내기"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [mode, setMode]       = useState("login");
  const [name, setName]       = useState("");
  const [studentId, setSid]   = useState("");
  const [password, setPass]   = useState("");
  const [password2, setPass2] = useState("");
  const [err, setErr]         = useState("");
  const [loading, setLoading] = useState(false);
  const [pendingUser, setPendingUser] = useState(null); // 가이드 보여줄 신규 유저
  const [showGuide, setShowGuide]     = useState(false);

  // 가이드 완료 후 로그인 처리
  function finishGuide() {
    setShowGuide(false);
    if (pendingUser) { onLogin(pendingUser, false); }
  }

  if (showGuide) return <InstallGuide onClose={finishGuide}/>;

  const inp = {width:"100%",padding:"11px 14px",background:c.surface,border:`1px solid ${c.border}`,borderRadius:10,color:c.text,fontSize:14,outline:"none",marginBottom:0,fontFamily:"inherit"};

  async function handleLogin() {
    setErr("");
    if (!name.trim() || !password) return setErr("이름과 비밀번호를 입력해주세요.");
    setLoading(true);
    try {
      // 관리자 계정 특수처리
      if (name.trim() === ADMIN_ID && password === ADMIN_PW) {
        onLogin({ name: ADMIN_ID, studentId: "", password: ADMIN_PW, isAdmin: true });
        return;
      }
      const u = await fbGetUser(name.trim());
      if (!u) return setErr("존재하지 않는 사용자입니다. 회원가입을 먼저 해주세요.");
      if (u.password !== password) return setErr("비밀번호가 틀렸습니다.");
      onLogin({...u, isAdmin: false});
    } catch(e) { setErr("오류가 발생했습니다. 다시 시도해주세요."); }
    finally { setLoading(false); }
  }

  async function handleSignup() {
    setErr("");
    if (!name.trim()) return setErr("이름을 입력해주세요.");
    if (!studentId.trim()) return setErr("학번을 입력해주세요.");
    if (!password) return setErr("비밀번호를 입력해주세요.");
    if (password !== password2) return setErr("비밀번호가 일치하지 않습니다.");
    if (password.length < 4) return setErr("비밀번호는 4자리 이상이어야 합니다.");
    setLoading(true);
    try {
      const existing = await fbGetUser(name.trim());
      if (existing) return setErr("이미 사용 중인 이름입니다.");
      await fbCreateUser(name.trim(), studentId.trim(), password);
      // 회원가입 후 로그인 화면으로 (앱 설치 안내 보여주기 위해)
      setMode("login");
      setName(name.trim());
      setPass("");
      setPass2("");
      setSid("");
      setErr("✅ 가입 완료! 이제 간편하게 앱을 설치해보세요 📲");
    } catch(e) { setErr("오류가 발생했습니다. 다시 시도해주세요."); }
    finally { setLoading(false); }
  }

  return (

        <div style={{display:"flex",flexDirection:"column",gap:12}}>

// ── ROOT ──────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(()=>{
    try {
      const saved = localStorage.getItem("msde_user");
      return saved ? JSON.parse(saved) : null;
    } catch(e) { return null; }
  });
  const [page, setPage_] = useState("home");
  function setPage(p) {
    setPage_(p);
    window.scrollTo(0,0);
    // 쪽지함 나갈 때 unread 재계산
    if(p==="home" && user) fetchUnread(user);
  }
  const [showInstallGuide, setShowInstallGuide] = useState(false); // unused, handled in LoginScreen
  const [onlineCount, setOnlineCount] = useState(0);
  const [unreadCount, setUnreadCount] = useState(0);
  const [showPushPrompt, setShowPushPrompt] = useState(false);
  const presenceRef = useRef(null);

  // presence 등록
  useEffect(() => {
    if (!user) return;
    const uid = user.name + "_" + Math.random().toString(36).slice(2,8);
    const ref = `${FIREBASE_URL}/presence/${uid}.json`;
    presenceRef.current = ref;
    // 접속 등록 후 바로 카운트 갱신
    fetch(ref, { method:"PUT", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ name:user.name, at:Date.now() }) })
      .then(async () => {
        try {
          const res = await fetch(`${FIREBASE_URL}/presence.json`);
          const data = await res.json();
          if (data) {
            const now = Date.now();
            const active = Object.values(data).filter(p => now - p.at < 10000);
            setOnlineCount(active.length);
          }
        } catch(e) {}
      });
    // 30초마다 갱신 (살아있음 표시)
    const hb = setInterval(()=>{
      fetch(ref, { method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ name:user.name, at:Date.now() }) });
    }, 8000);
    // 탭 닫힐 때 삭제
    const cleanup = () => fetch(ref, { method:"DELETE" });
    window.addEventListener("beforeunload", cleanup);
    return () => { clearInterval(hb); cleanup(); window.removeEventListener("beforeunload", cleanup); };
  }, [user]);

  // 접속자 수 폴링 (10초마다)
  useEffect(() => {
    if (!user) return;
    const fetchCount = async () => {
      try {
        const res = await fetch(`${FIREBASE_URL}/presence.json`);
        const data = await res.json();
        if (!data) { setOnlineCount(0); return; }
        // 1분 이내 갱신된 것만 카운트
        const now = Date.now();
        const active = Object.values(data).filter(p => now - p.at < 10000);
        // 오래된 presence 정리
        Object.entries(data).forEach(([k, p]) => {
          if (now - p.at > 10000) fetch(`${FIREBASE_URL}/presence/${k}.json`, { method:"DELETE" });
        });
        setOnlineCount(active.length);
      } catch(e) {}
    };
    fetchCount();
    const id = setInterval(fetchCount, 10000);
    return () => clearInterval(id);
  }, [user]);

  async function fetchUnread(u) {
    if(!u || u.isAdmin) return;
    try {
      const res = await fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(u.name)}.json`);
      const data = await res.json();
      if(!data) { setUnreadCount(0); return; }
      const cnt = Object.values(data).filter(m=>!m.read).length;
      setUnreadCount(cnt);
    } catch(e){}
  }
  function handleLogin(u) {
    setUser(u);
    setPage("home");
    try { localStorage.setItem("msde_user", JSON.stringify(u)); } catch(e) {}
    fetchUnread(u);
    // 알림 허용 여부 확인 (관리자 제외, 아직 결정 안 한 경우)
    if(!u.isAdmin && 'Notification' in window && Notification.permission === 'default') {
      setTimeout(()=>setShowPushPrompt(true), 1000);
    }
  }
  function handleLogout() {
    // presence 삭제
    if (presenceRef.current) fetch(presenceRef.current, { method:"DELETE" });
    setUser(null);
    setPage("home");
    try { localStorage.removeItem("msde_user"); } catch(e) {}
  }

  if (!user) return <LoginScreen onLogin={handleLogin}/>;

  if (page === "instruments") return <InstrumentsHub onBack={()=>setPage("home")} onNavigate={setPage} user={user}/>;
  if (page === "piano")   return <InstrumentPage type="piano"  onBack={()=>setPage("instruments")} user={user}/>;
  if (page === "guitar")  return <InstrumentPage type="guitar" onBack={()=>setPage("instruments")} user={user}/>;
  if (page === "rental")  return <RentalPage onBack={()=>setPage("instruments")} user={user}/>;
  if (page === "betting")    return <BettingPage onBack={()=>setPage("home")} user={user} onUserUpdate={u=>{setUser(u);try{localStorage.setItem("msde_user",JSON.stringify(u));}catch(e){}}}/>;
  if (page === "food")       return <FoodPage onBack={()=>setPage("home")}/>;
  if (page === "messages")   return <MessagesPage onBack={()=>setPage("home")} user={user}/>;
  if (page === "suggest")    return <SuggestPage onBack={()=>setPage("home")} user={user}/>;
  if (page === "adminpanel") return <AdminPanelPage onBack={()=>setPage("home")}/>;
  return (
    <>
      <HomePage onNavigate={setPage} user={user} onLogout={handleLogout} onlineCount={onlineCount} unreadCount={unreadCount}/>
      {showPushPrompt && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:9999,padding:"0 0 40px"}}>
          <div style={{background:"#141824",border:"1px solid #1e2d42",borderRadius:20,padding:"24px 20px",maxWidth:380,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>🔔</div>
            <div style={{fontSize:17,fontWeight:700,color:"#eef2ff",marginBottom:8}}>알림 수신 설정</div>
            <div style={{fontSize:13,color:"#5a6480",lineHeight:1.6,marginBottom:20}}>
              공지사항, 쪽지 등 새 소식을<br/>푸시 알림으로 받아볼 수 있어요
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowPushPrompt(false)}
                style={{flex:1,padding:"12px",background:"none",border:"1px solid #1e2d42",borderRadius:12,color:"#5a6480",fontSize:14,cursor:"pointer",fontWeight:600}}>
                나중에
              </button>
              <button onClick={async()=>{
                const ok = await subscribePush(user.name);
                setShowPushPrompt(false);
                if(ok) alert("✅ 알림이 설정됐어요!");
              }} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#60c0f0,#4090c0)",border:"none",borderRadius:12,color:"#0a0d14",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                🔔 알림 받기
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>
