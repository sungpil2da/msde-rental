// base64url → Uint8Array 변환
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from({length:raw.length}, (_,i)=>raw.charCodeAt(i));
}

async function subscribePush(userName) {
  try {
    if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();
    const sub = existing || await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Firebase에 구독 저장
    await fetch(`${FIREBASE_URL}/push_subscriptions/${encodeURIComponent(userName)}.json`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(sub.toJSON())
    });
    return true;
  } catch(e) { console.error('push subscribe error', e); return false; }
}

async function unsubscribePush(userName) {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub) await sub.unsubscribe();
    await fetch(`${FIREBASE_URL}/push_subscriptions/${encodeURIComponent(userName)}.json`, {method:'DELETE'});
  } catch(e) {}
}

// ── FIREBASE HELPERS ──────────────────────────────────────
function getThisWeekMonday() {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0,0,0,0);
  return monday;
}
function getWeekDates() {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  return DAYS.map((_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return (d.getMonth()+1) + "/" + d.getDate();
  });
}
const WEEK_DATES = getWeekDates();

function isPast(day, startSlot) {
  const now = new Date();
  const dayIdx = DAYS.indexOf(day);
  if (dayIdx === -1) return false;
  const [month, date] = WEEK_DATES[dayIdx].split("/").map(Number);
  const resDate = new Date(now.getFullYear(), month-1, date, parseInt(TIME_SLOTS[startSlot]), 0, 0);
  return resDate < now;
}

async function deleteOld(path) {
  try {
    const monday = getThisWeekMonday();
    const res = await fetch(`${FIREBASE_URL}/${path}.json`);
    const data = await res.json();
    if (!data) return;
    await Promise.all(
      Object.entries(data)
        .filter(([,v]) => v.createdAt < monday.getTime())
        .map(([k]) => fetch(`${FIREBASE_URL}/${path}/${k}.json`, { method:"DELETE" }))
    );
  } catch(e) { console.error(`${path} 자동 삭제 실패:`, e); }
}

async function fbList(path) {
  const res = await fetch(`${FIREBASE_URL}/${path}.json`);
  const data = await res.json();
  if (!data) return [];
  return Object.entries(data).map(([fbKey,val]) => ({...val, fbKey}));
}

}
async function fbRemove(path, fbKey) {

}

}

function getAt(reservations, day, i) {
  return reservations.find(r => r.day===day && i>=r.startSlot && i<r.startSlot+r.duration);
}
function isOccupied(reservations, day, i) {
  return reservations.some(r => r.day===day && i>=r.startSlot && i<r.startSlot+r.duration);
}
function userStats(reservations, name, studentId) {
  if (!name || !studentId) return {count:0, hours:0};
  const u = reservations.filter(r => r.name===name && r.studentId===studentId);
  return {count: u.length, hours: u.reduce((s,r)=>s+r.duration,0)};
}

function SuggestionCard({ s, onRefresh, currentUser }) {
  const [mode, setMode]       = useState(null);
  const [pwInput, setPwInput] = useState("");
  const [editText, setEditText] = useState(s.text);
  const [err, setErr]         = useState("");
  const [loading, setLoading] = useState(false);
  const BOARD_COLOR = "#a0a0f0";

  async function handleDelete() {
    setErr("");
    if (s.pw && pwInput !== s.pw) return setErr("비밀번호가 틀렸습니다.");
    setLoading(true);
    if (s.isNotice) await fbDeleteNotice(s.fbKey);
    else await fbDeleteSuggestion(s.fbKey);
    onRefresh();
  }
  async function handleEdit() {
    setErr("");
    if (!editText.trim()) return setErr("내용을 입력해주세요.");
    if (s.pw && pwInput !== s.pw) return setErr("비밀번호가 틀렸습니다.");
    setLoading(true);
    await fbUpdateSuggestion(s.fbKey, editText.trim());
    onRefresh();
    setMode(null); setLoading(false);
  }
  const pwInp = (val, set) => <input type="password" value={val} onChange={e=>set(e.target.value)} placeholder="비밀번호 입력"
    style={{width:"100%",padding:"8px 12px",background:c.bg,border:`1px solid ${c.border}`,borderRadius:8,color:c.text,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8}}/>;

  return (
    <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:12,padding:"14px 16px"}}>
      {s.author && <div style={{fontSize:12,fontWeight:700,color:BOARD_COLOR,marginBottom:6}}>{s.author}</div>}
      {mode==="edit" ? (
        <>
          <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={3}
            style={{width:"100%",padding:"10px 12px",background:c.bg,border:`1px solid ${c.border}`,borderRadius:8,color:c.text,fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",marginBottom:8}}/>
          {s.pw && pwInp(pwInput, setPwInput)}
          {err && <div style={{fontSize:12,color:c.error,marginBottom:8}}>⚠️ {err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setMode(null);setErr("");}} style={btnStyle(c.border, c.muted)}>취소</button>
            <button onClick={handleEdit} disabled={loading} style={btnStyle(BOARD_COLOR+"55", BOARD_COLOR)}>저장</button>
          </div>
        </>
      ) : mode==="delete" ? (
        <>
          <p style={{fontSize:13,color:c.muted,marginBottom:8}}>이 게시글을 삭제할까요?</p>
          {s.pw && pwInp(pwInput, setPwInput)}
          {err && <div style={{fontSize:12,color:c.error,marginBottom:8}}>⚠️ {err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setMode(null);setErr("");}} style={btnStyle(c.border, c.muted)}>취소</button>
            <button onClick={handleDelete} disabled={loading} style={btnStyle(c.error+"55", c.error)}>삭제</button>
          </div>
        </>
      ) : (
        <ReplyablePost s={s} onRefresh={onRefresh} setMode={setMode} setPwInput={setPwInput} setErr={setErr} BOARD_COLOR={BOARD_COLOR} currentUser={currentUser}/>
      )}
    </div>
  );
}

function btnStyle(borderColor, textColor) {
  return {flex:1,padding:"7px",background:"none",border:`1px solid ${borderColor}`,borderRadius:8,color:textColor,cursor:"pointer",fontSize:13};
}

    const maxCount = isGuitar ? 4 : 2;
    const maxHours = isGuitar ? 12 : 8;
    if (stats.count >= maxCount) return setErr(`주 ${maxCount}회 대여 한도를 초과했습니다.`);
    if (stats.hours + form.duration > maxHours) return setErr(`최대 ${maxHours}시간까지 가능합니다. 현재 ${stats.hours}시간 사용 중`);
    if (bookModal.startSlot + form.duration > TIME_SLOTS.length) return setErr("운영 시간을 초과합니다.");
    setSyncing(true);
    try {
      const latest = await fbList(path);
      for (let i=0; i<form.duration; i++) {
        if (isGuitar) {
          const slotRes = latest.filter(r => r.day===bookModal.day && i+bookModal.startSlot>=r.startSlot && i+bookModal.startSlot<r.startSlot+r.duration);
          if (slotRes.some(r => r.name === user.name)) { setErr("해당 시간대에 이미 본인 예약이 있습니다."); return; }
          if (slotRes.length >= 3) { setErr("해당 시간대 기타가 모두 대여 중입니다. (최대 3개)"); return; }
        } else {
          if (isOccupied(latest, bookModal.day, bookModal.startSlot+i)) { setErr("이미 예약된 시간대입니다."); return; }
        }
      }
      await fbAdd(path, {name:user.name, studentId:user.studentId, day:bookModal.day, startSlot:bookModal.startSlot, duration:form.duration, createdAt:Date.now()});
      await load(true);
      setBookModal(null);
      setForm(f=>({...f, duration:1}));
    } catch(e) { setErr("저장 중 오류가 발생했습니다."); }
    finally { setSyncing(false); }
  }

  async function doDelete(fbKey) {
    setSyncing(true);
    try { await fbRemove(path, fbKey); await load(true); }
    finally { setSyncing(false); setDel(null); }
  }



  if (loading) return (
    <div style={{minHeight:"100vh",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:36}}>{emoji}</div>
      <div style={{color:c.muted,fontSize:14}}>불러오는 중...</div>
    </div>
  );

  const inputStyle = {width:"100%",padding:"10px 14px",background:c.surface,border:`1px solid ${c.border}`,borderRadius:10,color:c.text,fontSize:14,outline:"none"};
  const labelStyle = {display:"block",fontSize:11,fontWeight:600,color:c.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"};

  return (
    <div style={{minHeight:"100vh",background:c.bg,color:c.text,fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:80}}>

      {/* HEADER */}
      <div style={{borderBottom:`1px solid ${c.border}`,padding:"16px 20px",display:"flex",alignItems:"center",gap:12,background:`linear-gradient(180deg,${c.surface},${c.bg})`}}>
        <button onClick={onBack} style={{background:`${accent}15`,border:`1px solid ${accent}33`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:accent,fontSize:13,fontWeight:600}}>← 홈</button>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>{emoji}</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:accent,letterSpacing:"-0.5px"}}>{label} 대여</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:c.muted}}>{isGuitar ? "인당 주 4회 · 최대 12시간 · 동시 3개" : "인당 주 2회 · 최대 8시간"}</p>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:syncing?accent:c.muted}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:syncing?accent:c.success,boxShadow:`0 0 6px ${syncing?accent:c.success}`,animation:syncing?"pulse 1s infinite":"none"}}/>
            {syncing?"저장 중...":lastSync?`${lastSync.getHours()}:${String(lastSync.getMinutes()).padStart(2,"0")} 동기화`:""}
          </div>
          <button onClick={()=>load()} style={{background:"none",border:`1px solid ${c.border}`,borderRadius:8,padding:"5px 10px",cursor:"pointer",color:c.muted,fontSize:12}}>↻</button>
        </div>
      </div>

      <div style={{padding:"0 20px",marginTop:16}}>
        <div>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              {DAYS.map((d,i)=>(
                <button key={d} onClick={()=>setDay(d)} style={{padding:"7px 14px",borderRadius:20,border:`1px solid ${day===d?accent:c.border}`,cursor:"pointer",fontSize:13,fontWeight:600,background:day===d?accent:c.surface,color:day===d?c.bg:c.muted,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                  <span>{d}요일</span>
                  <span style={{fontSize:10,fontWeight:400,opacity:0.7}}>{WEEK_DATES[i]}</span>
                </button>
              ))}
            </div>
            <div style={{borderRadius:14,border:`1px solid ${c.border}`,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:c.surface}}>
                    <th style={{padding:"10px 16px",fontSize:11,fontWeight:600,color:c.muted,textAlign:"left",borderBottom:`1px solid ${c.border}`,width:90}}>시간</th>
                    <th style={{padding:"10px 16px",fontSize:13,fontWeight:600,color:accent,textAlign:"center",borderBottom:`1px solid ${c.border}`,borderLeft:`1px solid ${c.border}`}}>{emoji} {label}</th>
                    <th style={{padding:"10px 16px",fontSize:11,fontWeight:600,color:c.muted,textAlign:"center",borderBottom:`1px solid ${c.border}`,borderLeft:`1px solid ${c.border}`,width:52}}>관리</th>
                  </tr>
                </thead>
                <tbody>
                  {TIME_SLOTS.map((time,i)=>{
                    const r = getAt(res, day, i);
                    const isStart = r && r.startSlot===i;
                    return (
                      <tr key={i} style={{background:i%2===0?c.bg:`${c.surface}88`}}>
                        <td style={{padding:"8px 16px",fontSize:13,color:c.muted,borderBottom:`1px solid ${c.border}22`}}>{time}</td>
                        <td style={{padding:"4px 8px",borderLeft:`1px solid ${c.border}`,borderBottom:`1px solid ${c.border}22`}}>
                          {isGuitar ? (()=>{
                            const slotRentals = res.filter(rv => rv.day===day && i>=rv.startSlot && i<rv.startSlot+rv.duration);
                            const cnt = slotRentals.length;
                            const alreadyMine = slotRentals.some(rv => rv.name === user.name);
                            const myRes = slotRentals.find(rv => rv.name === user.name);
                            const canBook = cnt < 3 && !alreadyMine;
                            return (
                              <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",flexWrap:"wrap"}}>
                                {slotRentals.map((rv,ri)=>(
                                  <span key={ri} style={{fontSize:12,fontWeight:600,color:rv.name===user.name?accent:c.muted,background:rv.name===user.name?`${accent}18`:c.surface2,border:`1px solid ${rv.name===user.name?accent+"55":c.border}`,borderRadius:20,padding:"3px 10px"}}>
                                    {rv.name}
                                  </span>
                                ))}
                                {canBook && (
                                  <button onClick={()=>{setBookModal({day,startSlot:i});setErr("");setForm(f=>({...f,duration:1}));}}
                                    style={{fontSize:11,color:c.success,background:`${c.success}0d`,border:`1px dashed ${c.success}55`,borderRadius:20,padding:"3px 10px",cursor:"pointer"}}>
                                    + 예약 ({3-cnt}자리)
                                  </button>
                                )}
                              </div>
                            );
                          })() : r ? (
                            <div style={{background:`${accent}18`,border:`1px solid ${accent}44`,borderRadius:6,padding:"5px 12px",fontSize:13,color:accent,fontWeight:isStart?600:400,textAlign:"center"}}>
                              {r.name} · {r.duration}시간
                            </div>
                          ) : (
                            <button onClick={()=>{setBookModal({day,startSlot:i});setErr("");setForm(f=>({...f,duration:1}));}} style={{width:"100%",height:28,borderRadius:6,background:`${c.success}0d`,border:`1px dashed ${c.success}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:`${c.success}88`,cursor:"pointer",transition:"all 0.15s"}}
                              onMouseEnter={e=>{e.currentTarget.style.background=`${c.success}15`;e.currentTarget.style.color=c.success;}}
                              onMouseLeave={e=>{e.currentTarget.style.background=`${c.success}0d`;e.currentTarget.style.color=`${c.success}88`;}}>
                              + 예약
                            </button>
                          )}
                        </td>
                        <td style={{padding:4,textAlign:"center",borderLeft:`1px solid ${c.border}`,borderBottom:`1px solid ${c.border}22`}}>
                          {isGuitar ? (()=>{
                            const myRes = res.find(rv => rv.name===user.name && rv.day===day && i>=rv.startSlot && i<rv.startSlot+rv.duration);
                            const isMyStart = myRes && myRes.startSlot===i;
                            if (isMyStart && !isPast(myRes.day, myRes.startSlot)) return <button onClick={()=>setDel(myRes)} style={{background:`${c.error}15`,border:`1px solid ${c.error}33`,borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,color:c.error}}>취소</button>;
                            if (isMyStart && isPast(myRes.day, myRes.startSlot)) return <span style={{fontSize:10,color:c.muted}}>종료</span>;
                            return null;
                          })() : (
                            <>
                              {isStart && !isPast(r.day, r.startSlot) && <button onClick={()=>setDel(r)} style={{background:`${c.error}15`,border:`1px solid ${c.error}33`,borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,color:c.error}}>취소</button>}
                              {isStart && isPast(r.day, r.startSlot) && <span style={{fontSize:10,color:c.muted}}>종료</span>}
                            </>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {(()=>{
              const dayRes = res.filter(r=>r.day===day);
              const total  = dayRes.reduce((s,r)=>s+r.duration,0);
              // 기타: 슬롯별 최대 동시 예약 수 고려한 남은 시간
              const remaining = isGuitar
                ? TIME_SLOTS.reduce((s,_,i)=>{ const cnt=res.filter(r=>r.day===day&&i>=r.startSlot&&i<r.startSlot+r.duration).length; return s+(3-cnt); },0)
                : TIME_SLOTS.length - total;
              return (
                <div style={{marginTop:12,display:"flex",gap:10}}>
                  {[{label:"예약된 시간",value:`${total}h`,color:accent},{label:"남은 슬롯",value:`${Math.max(0,remaining)}h`,color:c.success},{label:"예약 건수",value:`${dayRes.length}건`,color:c.muted}].map(({label,value,color})=>(
                    <div key={label} style={{flex:1,background:c.surface,border:`1px solid ${c.border}`,borderRadius:12,padding:"10px 14px"}}>
                      <div style={{fontSize:11,color:c.muted,marginBottom:3}}>{label}</div>
                      <div style={{fontSize:20,fontWeight:700,color}}>{value}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        )}

      </div>

      {/* BOOK MODAL */}
      {bookModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={()=>{setBookModal(null);setErr("");}}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,animation:"slideUp 0.25s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:2}}>{emoji} {bookModal.day}요일 {TIME_SLOTS[bookModal.startSlot]} 예약</div>
            <div style={{fontSize:12,color:c.muted,marginBottom:16}}>
              {user.name} · 이번 주 {stats.count}/{isGuitar?4:2}회, {stats.hours}/{isGuitar?12:8}시간 사용
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:11,fontWeight:600,color:c.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>대여 시간</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                {[1,2,3,4,5,6,7,8].map(h=>(
                  <button key={h} onClick={()=>setForm(f=>({...f,duration:h}))}
                    style={{width:42,height:42,borderRadius:10,border:`1px solid ${form.duration===h?accent:c.border}`,cursor:"pointer",fontSize:13,fontWeight:700,background:form.duration===h?`${accent}22`:c.surface2,color:form.duration===h?accent:c.muted}}>
                    {h}h
                  </button>
                ))}
              </div>
              <div style={{fontSize:12,color:c.muted,marginTop:8}}>{TIME_SLOTS[bookModal.startSlot]} ~ {TIME_SLOTS[bookModal.startSlot+form.duration]??"24:00"}</div>
            </div>
            {err && <div style={{background:`${c.error}15`,border:`1px solid ${c.error}44`,borderRadius:10,padding:"10px 14px",fontSize:13,color:c.error,marginBottom:12}}>⚠️ {err}</div>}
            <button onClick={submit} disabled={syncing}
              style={{width:"100%",padding:13,background:syncing?c.muted:`linear-gradient(135deg,${accent},${accent}bb)`,border:"none",borderRadius:12,color:c.bg,fontSize:15,fontWeight:700,cursor:syncing?"not-allowed":"pointer"}}>
              {syncing?"저장 중...":"예약 확정"}
            </button>
            <button onClick={()=>{setBookModal(null);setErr("");}} style={{width:"100%",padding:10,background:"none",border:`1px solid ${c.border}`,borderRadius:10,color:c.muted,cursor:"pointer",fontSize:14,marginTop:8}}>취소</button>
          </div>
        </div>
      )}

      {/* DELETE MODAL */}
      {del && (
        <div style={{position:"fixed",inset:0,background:"#00000088",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setDel(null)}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:18,padding:"26px 26px 20px",maxWidth:300,width:"90%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>{emoji} 예약 취소</div>
            <p style={{fontSize:14,color:c.muted,marginBottom:18,lineHeight:1.6}}>
              <strong style={{color:c.text}}>{del.name}</strong>님의 <strong style={{color:accent}}>{del.day}요일 {TIME_SLOTS[del.startSlot]}</strong> 예약을 취소할까요?
            </p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDel(null)} style={{flex:1,padding:10,background:"none",border:`1px solid ${c.border}`,borderRadius:10,color:c.muted,cursor:"pointer",fontSize:14}}>닫기</button>
              <button onClick={()=>doDelete(del.fbKey)} style={{flex:1,padding:10,background:`${c.error}22`,border:`1px solid ${c.error}55`,borderRadius:10,color:c.error,cursor:"pointer",fontSize:14,fontWeight:600}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RentalPage({ onBack, user }) {
  const [rentals, setRentals]     = useState([]);
  const [logs, setLogs]           = useState([]);
  const [loading, setLoading]     = useState(true);
  const [syncing, setSyncing]     = useState(false);
  const [confirm, setConfirm]     = useState(null);
  const [itemLabel, setItemLabel] = useState(""); // 대여 시 물품 번호 입력
  const [returning, setReturning] = useState(null);
  const [msg, setMsg]             = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);

  const showMsg = (text, ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg(null),2500); };

  const load = useCallback(async (quiet=false) => {
    try {
      if(!quiet) setLoading(true);
      const [r, l] = await Promise.all([fbList("rental_items"), fbList("rental_logs")]);
      setRentals(r);
      setLogs(l.sort((a,b)=>b.at-a.at));

    } catch(e){ console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(()=>{ load(); },[]);
  useEffect(()=>{ const id=setInterval(()=>load(true),4000); return()=>clearInterval(id); },[]);

  const myRentals = rentals.filter(r => r.userName === user.name && r.status === "out");
  const getInUse  = (itemId) => rentals.filter(r => r.itemId===itemId && r.status==="out").length;
  const getAvail  = (itemId) => { const item = ITEMS.find(i=>i.id===itemId); return item.total - getInUse(itemId); };
  const myItem    = (itemId) => myRentals.find(r => r.itemId===itemId) || null;

  async function doTake(item) {
    // 일회용품: 그냥 로그만 남김
    setSyncing(true);
    try {
      await fbAdd("rental_logs", { type:"disposable", itemId:item.id, itemName:item.name, userName:user.name, studentId:user.studentId, at:Date.now() });
      await load(true);
      showMsg(`✅ ${item.name} 가져가기 완료!`);
    } catch(e){ showMsg("오류가 발생했습니다.", false); }
    finally { setSyncing(false); setConfirm(null); }
  }

  async function doBorrow(item) {
    if(getAvail(item.id) <= 0) return showMsg("대여 가능한 수량이 없습니다.", false);
    if(myItem(item.id)) return showMsg("이미 대여 중인 물품입니다.", false);
    const label = itemLabel.trim() || item.name;
    setSyncing(true);
    try {
      await fbAdd("rental_items", { itemId:item.id, itemName:item.name, itemLabel:label, userName:user.name, studentId:user.studentId, status:"out", borrowedAt:Date.now() });
      await fbAdd("rental_logs", { type:"borrow", itemId:item.id, itemName:item.name, itemLabel:label, userName:user.name, studentId:user.studentId, at:Date.now() });
      await load(true);
      showMsg(`✅ ${label} 대여 완료!`);
    } catch(e){ showMsg("오류가 발생했습니다.", false); }
    finally { setSyncing(false); setConfirm(null); setItemLabel(""); }
  }

  async function doReturn(rental) {
    setSyncing(true);
    try {
      await fbRemove("rental_items", rental.fbKey);
      await fbAdd("rental_logs", { type:"return", itemId:rental.itemId, itemName:rental.itemName, userName:rental.userName, studentId:rental.studentId, borrowedAt:rental.borrowedAt, at:Date.now() });
      await load(true);
      showMsg(`✅ ${rental.itemName} 반납 완료!`);
    } catch(e){ showMsg("오류가 발생했습니다.", false); }
    finally { setSyncing(false); setReturning(null); }
  }

  async function doDeleteUser(targetUser) {
    setSyncing(true);
    try {
      await Promise.all([
        fetch(`${FIREBASE_URL}/users/${encodeURIComponent(targetUser.name)}.json`, { method:"DELETE" }),
        fetch(`${FIREBASE_URL}/betting_users/${encodeURIComponent(targetUser.name)}.json`, { method:"DELETE" }),
        fetch(`${FIREBASE_URL}/betting_mybets_${encodeURIComponent(targetUser.name)}.json`, { method:"DELETE" }),
        fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(targetUser.name)}.json`, { method:"DELETE" }),
      ]);
      await load(true);
      showMsg(`✅ ${targetUser.name} 탈퇴 처리 완료`);
    } catch(e) { showMsg("오류가 발생했습니다.", false); }
    finally { setSyncing(false); setDeleteTarget(null); }
  }

  const fmtTime = (ts) => {
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };

  const typeLabel = { borrow:"대여", return:"반납", disposable:"가져가기" };
  const typeColor = { borrow:c.guitar, return:c.success, disposable:c.rental };

  if (loading) return (
    <div style={{minHeight:"100vh",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:36}}>📦</div>
      <div style={{color:c.muted,fontSize:14}}>불러오는 중...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:c.bg,color:c.text,fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",paddingBottom:60}}>

      {/* HEADER */}
      <div style={{borderBottom:`1px solid ${c.border}`,padding:"16px 20px",display:"flex",alignItems:"center",gap:12,background:`linear-gradient(180deg,${c.surface},${c.bg})`}}>
        <button onClick={onBack} style={{background:`${c.rental}15`,border:`1px solid ${c.rental}33`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:c.rental,fontSize:13,fontWeight:600}}>← 홈</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <span style={{fontSize:20}}>📦</span>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:c.rental}}>대여사업 물품</h1>
          </div>
          <p style={{margin:0,fontSize:12,color:c.muted}}>반납할 때 반납 버튼만 누르면 돼요</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:syncing?c.rental:c.muted}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncing?c.rental:c.success,boxShadow:`0 0 6px ${syncing?c.rental:c.success}`,animation:syncing?"pulse 1s infinite":"none"}}/>
          {syncing?"저장 중...":""}
        </div>
      </div>

      <div style={{padding:"16px 20px",maxWidth:480,margin:"0 auto"}}>

        {/* 내가 대여중 */}
        {myRentals.length > 0 && (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:c.rental,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>📋 내가 대여 중</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {myRentals.map(r => (
                <div key={r.fbKey} style={{background:c.surface,border:`1px solid ${c.rental}44`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{fontSize:22}}>{ITEMS.find(i=>i.id===r.itemId)?.emoji||"📦"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:c.text}}>{r.itemLabel||r.itemName}</div>
                    <div style={{fontSize:11,color:c.muted}}>대여: {fmtTime(r.borrowedAt)}</div>
                  </div>
                  <button
                    onClick={()=>setReturning(r)}
                    style={{padding:"7px 16px",background:`${c.rental}20`,border:`1px solid ${c.rental}55`,borderRadius:8,color:c.rental,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                    반납
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 일회용품 */}
        <div style={{fontSize:11,color:c.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>🪥 일회용품</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:24}}>
          {ITEMS.filter(i=>i.disposable).map(item=>(
            <div key={item.id} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:12,padding:"12px",position:"relative",overflow:"hidden",display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${c.rental}88,transparent)`}}/>
              <div style={{fontSize:26}}>{item.emoji}</div>
              <div style={{fontSize:14,fontWeight:700,color:c.text}}>{item.name}</div>
              <button onClick={()=>setConfirm(item)} style={{width:"100%",padding:"6px",background:`linear-gradient(135deg,${c.rental},${c.rental}cc)`,border:"none",borderRadius:7,color:c.bg,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                가져가기
              </button>
            </div>
          ))}
        </div>

        {/* 카테고리별 대여 물품 */}
        {ITEM_CATEGORIES.map(cat=>{
          const catItems = ITEMS.filter(i=>i.category===cat.key);
          return (
            <div key={cat.key} style={{marginBottom:20}}>
              <div style={{fontSize:11,color:c.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>{cat.emoji} {cat.key}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {catItems.map(item=>{
                  const inUse = getInUse(item.id);
                  const avail = item.total - inUse;
                  const isMine = !!myItem(item.id);
                  const full = avail <= 0;
                  const users = rentals.filter(r=>r.itemId===item.id&&r.status==="out").map(r=>r.userName);
                  return (
                    <div key={item.id} style={{background:c.surface,border:`1px solid ${full&&!isMine?c.error+"44":c.border}`,borderRadius:12,padding:"12px 14px",position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${c.rental}${full?"33":"88"},transparent)`}}/>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{fontSize:22,flexShrink:0}}>{item.emoji}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:700,color:c.text,marginBottom:3}}>{item.name}</div>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:c.muted}}>전체 {item.total}</span>
                            <span style={{fontSize:11,fontWeight:700,color:full?c.error:c.success,background:full?`${c.error}15`:`${c.success}15`,border:`1px solid ${full?c.error+"33":c.success+"33"}`,borderRadius:10,padding:"1px 7px"}}>
                              가능 {avail}
                            </span>
                            {users.length>0&&rentals.filter(r=>r.itemId===item.id&&r.status==="out").map((r,i)=>(
                              <span key={i} style={{fontSize:10,color:r.userName===user.name?c.rental:c.muted,background:c.surface2,border:`1px solid ${c.border}`,borderRadius:10,padding:"1px 6px"}}>
                                {r.itemLabel||r.userName}{r.userName===user.name?" (나)":""}
                              </span>
                            ))}
                          </div>
                        </div>
                        <div style={{flexShrink:0}}>
                          {isMine
                            ? <button onClick={()=>setReturning(myItem(item.id))} style={{padding:"6px 12px",background:`${c.rental}20`,border:`1px solid ${c.rental}55`,borderRadius:7,color:c.rental,fontSize:12,fontWeight:700,cursor:"pointer"}}>반납</button>
                            : <button onClick={()=>{if(!full){setConfirm(item);setItemLabel("");}}} disabled={full}
                                style={{padding:"6px 12px",background:full?"none":`linear-gradient(135deg,${c.rental},${c.rental}cc)`,border:`1px solid ${full?c.border:c.rental}`,borderRadius:7,color:full?c.muted:c.bg,fontSize:12,fontWeight:700,cursor:full?"not-allowed":"pointer",opacity:full?0.5:1}}>
                                {full?"마감":"대여"}
                              </button>
                          }
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}


      </div>

      {/* 메시지 토스트 */}
      {msg && (
        <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:c.surface2,border:`1px solid ${msg.ok?c.success+"55":c.error+"55"}`,borderRadius:10,padding:"10px 20px",fontSize:14,color:msg.ok?c.success:c.error,zIndex:200,whiteSpace:"nowrap",boxShadow:"0 4px 20px #00000044"}}>
          {msg.text}
        </div>
      )}

      {/* 대여 확인 모달 */}
      {confirm && (
        <div style={{position:"fixed",inset:0,background:"#00000088",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setConfirm(null)}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:18,padding:"26px 24px 20px",maxWidth:300,width:"90%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>{confirm.emoji}</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:6,textAlign:"center"}}>{confirm.name} {confirm.disposable?"가져가기":"대여"}</div>
            <p style={{fontSize:14,color:c.muted,marginBottom:confirm.disposable?18:12,lineHeight:1.6,textAlign:"center"}}>
              <strong style={{color:c.text}}>{user.name}</strong>님이<br/>
              <strong style={{color:c.rental}}>{confirm.name}</strong>을(를) {confirm.disposable?"가져갈까요?":"대여할까요?"}
            </p>
            {!confirm.disposable && (
              <div style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:11,fontWeight:600,color:c.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>물품 번호 / 이름 (선택)</label>
                <input
                  value={itemLabel}
                  onChange={e=>setItemLabel(e.target.value)}
                  placeholder={`예: ${confirm.name}3`}
                  style={{width:"100%",padding:"9px 12px",background:c.surface2,border:`1px solid ${c.border}`,borderRadius:8,color:c.text,fontSize:14,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}
                  autoFocus
                />
                <div style={{fontSize:11,color:c.muted,marginTop:4}}>입력하지 않으면 물품명으로 기록돼요</div>
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirm(null)} style={{flex:1,padding:10,background:"none",border:`1px solid ${c.border}`,borderRadius:10,color:c.muted,cursor:"pointer",fontSize:14}}>취소</button>
              <button onClick={()=>confirm.disposable?doTake(confirm):doBorrow(confirm)} disabled={syncing} style={{flex:1,padding:10,background:`linear-gradient(135deg,${c.rental},${c.rental}cc)`,border:"none",borderRadius:10,color:c.bg,cursor:"pointer",fontSize:14,fontWeight:700}}>
                {confirm.disposable?"가져가기":"대여하기"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 반납 확인 모달 */}
      {returning && (
        <div style={{position:"fixed",inset:0,background:"#00000088",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setReturning(null)}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:18,padding:"26px 24px 20px",maxWidth:300,width:"90%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>{ITEMS.find(i=>i.id===returning.itemId)?.emoji||"📦"}</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:6,textAlign:"center"}}>{returning.itemName} 반납</div>
            <p style={{fontSize:14,color:c.muted,marginBottom:18,lineHeight:1.6,textAlign:"center"}}>
              <strong style={{color:c.rental}}>{returning.itemName}</strong>을(를)<br/>반납할까요?
            </p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setReturning(null)} style={{flex:1,padding:10,background:"none",border:`1px solid ${c.border}`,borderRadius:10,color:c.muted,cursor:"pointer",fontSize:14}}>취소</button>
              <button onClick={()=>doReturn(returning)} disabled={syncing} style={{flex:1,padding:10,background:`${c.error}22`,border:`1px solid ${c.error}55`,borderRadius:10,color:c.error,cursor:"pointer",fontSize:14,fontWeight:600}}>반납하기</button>
            </div>
          </div>
        </div>
      )}
      {/* 탈퇴 확인 모달 */}
      {deleteTarget && (
        <div style={{position:"fixed",inset:0,background:"#00000088",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setDeleteTarget(null)}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:18,padding:"26px 24px 20px",maxWidth:300,width:"90%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>🗑️</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:6,textAlign:"center"}}>회원 탈퇴</div>
            <p style={{fontSize:14,color:c.muted,marginBottom:6,lineHeight:1.6,textAlign:"center"}}>
              <strong style={{color:c.text}}>{deleteTarget.name}</strong>님을<br/>탈퇴 처리할까요?
            </p>
            <p style={{fontSize:12,color:c.error,marginBottom:18,textAlign:"center"}}>이 작업은 되돌릴 수 없습니다.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDeleteTarget(null)} style={{flex:1,padding:10,background:"none",border:`1px solid ${c.border}`,borderRadius:10,color:c.muted,cursor:"pointer",fontSize:14}}>취소</button>
              <button onClick={()=>doDeleteUser(deleteTarget)} disabled={syncing}
                style={{flex:1,padding:10,background:`${c.error}22`,border:`1px solid ${c.error}55`,borderRadius:10,color:c.error,cursor:"pointer",fontSize:14,fontWeight:600}}>
                탈퇴 처리
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── BETTING PAGE ──────────────────────────────────────────
function BettingPage({ onBack, user, onUserUpdate }) {
  const [bets, setBets]           = useState([]);
  const [myBets, setMyBets]       = useState({});
  const [ranking, setRanking]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [syncing, setSyncing]     = useState(false);
  const [tab, setTab]             = useState(user.isAdmin ? "admin" : "bets");
  const [msg, setMsg]             = useState(null);
  const [betModal, setBetModal]   = useState(null); // {bet}
  const [suggestions, setSuggestions] = useState([]);
  const [sugText, setSugText]   = useState("");
  const [sugAnon, setSugAnon]   = useState(true);
  const [sugOk, setSugOk]       = useState(false);
  const [sugErr, setSugErr]     = useState("");
  const [sugLoading, setSugLoading] = useState(false);
  const [betAmount, setBetAmount] = useState(100);
  const [betChoice, setBetChoice] = useState(null);
  // admin
  const [newBet, setNewBet]       = useState({ title:"", yesOdds:"1.8", noOdds:"1.7" });
  const [allUsers, setAllUsers]   = useState([]);
  const [prize, setPrize]         = useState(null); // {desc, image, weekStart}
  const [editPrize, setEditPrize] = useState({ desc:"", image:"", barcode:"", winnerCount:1, ranks:[] });

  const showMsg = (text, ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg(null),2500); };

  const getMonday = () => {
    const d = new Date(); const dow = d.getDay();
    d.setDate(d.getDate() - (dow===0?6:dow-1)); d.setHours(0,0,0,0); return d.getTime();
  };
  const getTodayStr = () => { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };

  const load = useCallback(async (quiet=false) => {
    try {
      if(!quiet) setLoading(true);
      const [bData, uData] = await Promise.all([
        fetch(`${FIREBASE_URL}/betting_bets.json`).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/betting_users.json`).then(r=>r.json()),
      ]);
      const bArr = bData ? Object.entries(bData).map(([id,v])=>({id,...v})).filter(b=>b.weekStart===getMonday()) : [];
      setBets(bArr.sort((a,b)=>b.createdAt-a.createdAt));
      // 이번 주 상품 로드
      const prizeData = await fetch(`${FIREBASE_URL}/betting_prize.json`).then(r=>r.json());
      if(prizeData && prizeData.weekStart === getMonday()) {
        setPrize(prizeData);
        setEditPrize(p=>({...p, winnerCount: prizeData.winnerCount||1, ranks: prizeData.ranks||[] }));
      } else { setPrize(null); }
      // 제안 목록
      const sugData = await fbGetBetSuggestions();
      setSuggestions(sugData);
      // 내 배팅 기록
      const myKey = `betting_mybets_${user.name}`;
      const myData = await fetch(`${FIREBASE_URL}/${myKey}.json`).then(r=>r.json());
      setMyBets(myData||{});
      // 랭킹 - 탈퇴 유저 제외
      const usersData = await fetch(`${FIREBASE_URL}/users.json`).then(r=>r.json());
      const activeNames = usersData ? new Set(Object.keys(usersData)) : new Set();
      activeNames.add(user.name); // 본인은 항상 포함
      const rankArr = uData ? Object.values(uData)
        .filter(u=>u.weekStart===getMonday() && activeNames.has(u.name))
        .sort((a,b)=>b.coins-a.coins) : [];
      setRanking(rankArr);
      if(user.isAdmin) { setAllUsers(usersData ? Object.values(usersData) : []); }
    } catch(e){ console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(()=>{ checkDailyBonus(); load(); },[]);
  useEffect(()=>{ const id=setInterval(()=>load(true),5000); return()=>clearInterval(id); },[]);

  async function checkDailyBonus() {
    if(user.isAdmin) return;
    const today = getTodayStr();
    const key = `betting_users/${encodeURIComponent(user.name)}`;
    const res = await fetch(`${FIREBASE_URL}/${key}.json`).then(r=>r.json());
    const monday = getMonday();
    // 주가 바뀌었으면 코인 리셋
    if(!res || res.weekStart !== monday) {
      const newCoins = 500;
      await fetch(`${FIREBASE_URL}/${key}.json`, { method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ name:user.name, coins:newCoins, lastBonus:today, weekStart:monday, wins:res?.wins||0 })
      });
      const updated = {...user, coins:newCoins};
      onUserUpdate(updated);
      showMsg("🎉 주간 리셋! 500코인이 지급됐어요!");
      return;
    }
    // 오늘 보너스 이미 받았으면 패스
    if(res.lastBonus === today) {
      onUserUpdate({...user, coins:res.coins});
      return;
    }
    // 오늘 보너스 지급
    const newCoins = (res.coins||0) + 500;
    await fetch(`${FIREBASE_URL}/${key}.json`, { method:"PATCH", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ coins:newCoins, lastBonus:today })
    });
    const updated = {...user, coins:newCoins};
    onUserUpdate(updated);
    showMsg("🎁 오늘의 보너스 +500코인!");
  }

  async function placeBet(bet) {
    if(!betChoice) return showMsg("선택지를 골라주세요.", false);
    const safeAmount = Number(betAmount);
    if(!safeAmount || safeAmount < 1) return showMsg("1코인 이상 배팅하세요.", false);
    if(isNaN(safeAmount)) return showMsg("올바른 금액을 입력해주세요.", false);
    const myCoins = user.coins||0;
    if(safeAmount > myCoins) return showMsg("코인이 부족해요.", false);
    if(myBets[bet.id]) return showMsg("이미 배팅한 항목이에요.", false);
    setSyncing(true);
    try {
      // 코인 차감
      const newCoins = myCoins - safeAmount;
      await fetch(`${FIREBASE_URL}/betting_users/${encodeURIComponent(user.name)}.json`, {
        method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify({coins:newCoins})
      });
      // 배팅 기록
      const myKey = `betting_mybets_${user.name}`;
      await fetch(`${FIREBASE_URL}/${myKey}/${bet.id}.json`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ choice:betChoice, amount:safeAmount, at:Date.now() })
      });
      // 배팅 참여자 추가
      await fetch(`${FIREBASE_URL}/betting_bets/${bet.id}/participants/${encodeURIComponent(user.name)}.json`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ choice:betChoice, amount:safeAmount })
      });
      onUserUpdate({...user, coins:newCoins});
      await load(true);
      setBetModal(null);
      showMsg(`✅ ${safeAmount}코인 배팅 완료!`);
    } catch(e){ showMsg("오류가 발생했습니다.", false); }
    finally { setSyncing(false); }
  }

  async function settleBet(bet, winChoice) {
    setSyncing(true);
    try {
      const participants = bet.participants||{};
      const updates = {};
      for(const [uname, p] of Object.entries(participants)) {
        if(p.choice === winChoice) {
          const odds = bet.type==="yesno"
            ? (winChoice==="yes" ? bet.yesOdds : bet.noOdds)
            : (bet.odds?.[winChoice]||2.0);
          const prize = Math.floor(p.amount * odds);
          const uRes = await fetch(`${FIREBASE_URL}/betting_users/${encodeURIComponent(uname)}.json`).then(r=>r.json());
          const curCoins = uRes?.coins||0;
          await fetch(`${FIREBASE_URL}/betting_users/${encodeURIComponent(uname)}.json`, {
            method:"PATCH", headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ coins: curCoins + prize })
          });
          // 유저 정보 갱신
          const savedUser = JSON.parse(localStorage.getItem("msde_user")||"{}");
          if(savedUser.name === uname) {
            const updated = {...savedUser, coins: curCoins + prize};
            localStorage.setItem("msde_user", JSON.stringify(updated));
          }
        }
      }
      await fetch(`${FIREBASE_URL}/betting_bets/${bet.id}.json`, {
        method:"PATCH", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ status:"settled", result:winChoice })
      });
      await load(true);
      showMsg("✅ 정산 완료!");
    } catch(e){ showMsg("오류.", false); }
    finally { setSyncing(false); }
  }

  async function createBet() {
    if(!newBet.title.trim()) return showMsg("제목을 입력하세요.", false);
    setSyncing(true);
    try {
      const betData = {
        title: newBet.title.trim(),
        type: "yesno",
        yesOdds: Number(newBet.yesOdds)||1.8,
        noOdds: Number(newBet.noOdds)||1.7,
        status: "open",
        weekStart: getMonday(),
        createdAt: Date.now(),
      };
      await fetch(`${FIREBASE_URL}/betting_bets.json`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(betData)
      });
      setNewBet({ title:"", yesOdds:"1.8", noOdds:"1.7" });
      await load(true);

                  const myBet = myBets[bet.id];

                      {myBet&&(
                        <div style={{fontSize:12,padding:"6px 10px",borderRadius:8,background:won?`${c.success}15`:`${c.error}15`,border:`1px solid ${won?c.success+"44":c.error+"44"}`,color:won?c.success:c.error}}>
                          {won?`🎉 적중! +${Math.floor(myBet.amount*(bet.result==="yes"?bet.yesOdds:bet.noOdds))}코인`:`😢 실패 -${myBet.amount}코인`}
                        </div>
                      )}

              </>
            )}

        {/* 랭킹 */}
        {tab==="ranking" && (
          <div>
            <div style={{fontSize:11,color:c.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>이번주 코인 랭킹</div>
            {ranking.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:c.muted}}>아직 참여자가 없어요</div>
              : ranking.map((u,i)=>{
                  const medals=["🥇","🥈","🥉"];
                  const isMe = u.name===user.name;

                    <div key={i} style={{background:isMe?`${c.bet}15`:c.surface,border:`1px solid ${isMe?c.bet+"55":c.border}`,borderRadius:12,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                      <div style={{fontSize:20,width:28,textAlign:"center"}}>{medals[i]||`${i+1}`}</div>
                      <div style={{flex:1}}>

        {/* 관리자 탭 */}

          <div>

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:c.bet}}>주제 제안하기</div>
                <button onClick={()=>setSugAnon(v=>!v)}
                  style={{padding:"3px 12px",background:sugAnon?"transparent":c.bet,border:`1.5px solid ${c.bet}`,borderRadius:20,color:sugAnon?c.bet:"#0a0d14",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all 0.2s"}}>
                  {sugAnon?"익명":"실명 ✓"}
                </button>
              </div>
              <textarea value={sugText} onChange={e=>setSugText(e.target.value)}
                placeholder="예: 오늘 1교시에 지각하는 사람 있다 YES/NO" rows={3}
                style={{width:"100%",padding:"10px 12px",background:c.surface2,border:`1px solid ${c.border}`,borderRadius:10,color:c.text,fontSize:14,outline:"none",resize:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:10}}/>
              {sugErr && <div style={{fontSize:12,color:c.error,marginBottom:8}}>⚠️ {sugErr}</div>}

              <button onClick={async()=>{
                setSugErr("");
                if(!sugText.trim()) return setSugErr("내용을 입력해주세요.");

                try {
                  await fbAddBetSuggestion({ text:sugText.trim(), author:sugAnon?"익명":user.name, authorId:user.name, likes:[], createdAt:Date.now() });
                  setSugText(""); setSugOk(true); setTimeout(()=>setSugOk(false),3000);
                  await load(true);
                } catch(e){ setSugErr("오류가 발생했습니다."); }
                finally { setSugLoading(false); }
              }} disabled={sugLoading}
                style={{width:"100%",padding:"10px",background:sugLoading?c.muted:`linear-gradient(135deg,${c.bet},${c.bet}bb)`,border:"none",borderRadius:10,color:c.bg,fontSize:14,fontWeight:700,cursor:"pointer"}}>

                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:11,color:c.muted}}>{s.author||"익명"}</span>

                        <button onClick={async()=>{
                          const liked = (s.likes||[]).includes(user.name);

        {tab==="admin" && user.isAdmin && (

              {prize && (
                <div style={{background:`${c.bet}10`,border:`1px solid ${c.bet}33`,borderRadius:10,padding:"10px 12px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:c.text}}>
                      {(prize.ranks||[{desc:prize.desc,image:prize.image}]).map((r,i)=>`${i+1}등: ${r.desc}`).join(" / ")}

                  </div>

                    await fetch(`${FIREBASE_URL}/betting_prize.json`,{method:"DELETE"});
                    setPrize(null); showMsg("상품이 삭제됐어요.");
                  }} style={{padding:"4px 10px",background:`${c.error}15`,border:`1px solid ${c.error}33`,borderRadius:6,color:c.error,cursor:"pointer",fontSize:11}}>삭제</button>
                </div>
              )}

              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {/* 수상 인원 선택 */}
                <div>
                  <label style={{fontSize:11,color:c.muted,display:"block",marginBottom:4}}>수상 인원</label>

                    {[1,2,3].map(n=>(
                      <button key={n} onClick={()=>setEditPrize(p=>({...p,winnerCount:n}))}

                  const updateRank = (field, val) => {
                    setEditPrize(p=>{
                      const ranks = [...(p.ranks||Array.from({length:p.winnerCount||1},()=>({desc:"",image:"",barcode:""})))];
                      ranks[rankIdx] = {...(ranks[rankIdx]||{}), [field]:val};
                      return {...p, ranks};
                    });
                  };
                  const makeUploader = (field, max, emoji) => (
                    <label style={{width:72,height:72,borderRadius:8,border:`1px dashed ${rankData[field]?"transparent":c.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:2,background:rankData[field]?"transparent":c.surface2,position:"relative",flexShrink:0}}>
                      {rankData[field]
                        ? <><img src={rankData[field]} style={{width:72,height:72,objectFit:"cover",borderRadius:8,border:`1px solid ${c.border}`}}/>

                        : <><span style={{fontSize:18}}>{emoji}</span><span style={{fontSize:9,color:c.muted}}>추가</span></>
                      }

                        const file=e.target.files[0]; if(!file) return;
                        const reader=new FileReader();
                        reader.onload=ev=>{ const img2=new window.Image(); img2.onload=()=>{ const canvas=document.createElement("canvas"); let w=img2.width,h=img2.height; if(w>max){h=Math.round(h*max/w);w=max;} canvas.width=w;canvas.height=h; canvas.getContext("2d").drawImage(img2,0,0,w,h); updateRank(field,canvas.toDataURL("image/webp",0.85)); }; img2.src=ev.target.result; };
                        reader.readAsDataURL(file); e.target.value="";
                      }} style={{display:"none"}}/>
                    </label>
                  );
                  return (
                    <div key={rankIdx} style={{background:c.surface2,borderRadius:10,padding:"12px",border:`1px solid ${c.border}`}}>

                        placeholder={`${rankIdx+1}등 상품 이름`} style={{...inp,marginBottom:8}}/>

                        <div style={{flex:1}}>
                          <div style={{fontSize:10,color:c.muted,marginBottom:4}}>📷 공개 사진</div>
                          {makeUploader("image",300,"📷")}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:10,color:c.muted,marginBottom:4}}>🔐 바코드</div>
                          {makeUploader("barcode",600,"🔐")}
                        </div>
                      </div>
                    </div>
                  );
                })}

                <button onClick={async()=>{
                  const count = editPrize.winnerCount||1;
                  const ranks = editPrize.ranks||[];

                  const data={winnerCount:count,ranks:ranks.slice(0,count),weekStart:getMonday(),updatedAt:Date.now(),
                    desc:ranks[0]?.desc||"", image:ranks[0]?.image||""};
                  await fetch(`${FIREBASE_URL}/betting_prize.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
                  setPrize(data); setEditPrize({desc:"",image:"",barcode:"",winnerCount:1,ranks:[]});
                  showMsg("✅ 상품이 설정됐어요!");
                }} style={{padding:"10px",background:`linear-gradient(135deg,${c.bet},${c.bet}bb)`,border:"none",borderRadius:10,color:c.bg,fontSize:14,fontWeight:700,cursor:"pointer"}}>
                  상품 저장
                </button>

                {/* 바코드 전송 버튼 */}
                {prize && (prize.ranks||[]).some(r=>r.barcode) && ranking.length>0 && (
                  <button onClick={async()=>{
                    const count = prize.winnerCount||1;
                    const winners = ranking.slice(0,count);
                    if(!winners.length) return showMsg("랭킹이 없어요.",false);
                    const medals=["🥇","🥈","🥉"];
                    for(const [i,w] of winners.entries()) {
                      const r = (prize.ranks||[])[i]||{};
                      if(!r.barcode) continue;
                      const msg={from:"관리자",to:w.name,
                        title:`${medals[i]} ${i+1}등 당첨! ${r.desc}`,
                        text:`이번 주 미니게임 ${i+1}위를 달성하셨습니다!\n아래 바코드로 상품을 수령하세요 🎉`,
                        image:r.barcode,createdAt:Date.now(),read:false};
                      await fetch(`${FIREBASE_URL}/messages/${encodeURIComponent(w.name)}.json`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(msg)});
                    }
                    showMsg(`✅ ${winners.map(w=>w.name).join(", ")}님께 전송 완료!`);
                  }} style={{padding:"10px",background:`linear-gradient(135deg,#ffd060,#e0a040)`,border:"none",borderRadius:10,color:"#0a0d14",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                    🏆 {ranking.slice(0,prize.winnerCount||1).map((w,i)=>`${i+1}등 ${w.name}`).join(", ")||"없음"}에게 바코드 전송
                  </button>
                )}
              </div>
            </div>

            {/* 새 배팅 만들기 */}
            <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:14,padding:"16px",marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:c.bet,marginBottom:12}}>새 배팅 항목 만들기</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div>
                  <label style={{fontSize:11,color:c.muted,display:"block",marginBottom:4}}>제목</label>
                  <input value={newBet.title} onChange={e=>setNewBet(n=>({...n,title:e.target.value}))} placeholder="예: 교수님이 10분 늦게 오신다" style={inp}/>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,color:c.muted,display:"block",marginBottom:4}}>YES 배율</label>
                    <input type="number" step="0.1" value={newBet.yesOdds} onChange={e=>setNewBet(n=>({...n,yesOdds:e.target.value}))} placeholder="1.8" style={inp}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,color:c.muted,display:"block",marginBottom:4}}>NO 배율</label>
                    <input type="number" step="0.1" value={newBet.noOdds} onChange={e=>setNewBet(n=>({...n,noOdds:e.target.value}))} placeholder="1.7" style={inp}/>
                  </div>
                </div>
                <button onClick={createBet} disabled={syncing} style={{padding:"11px",background:`linear-gradient(135deg,${c.bet},${c.bet}bb)`,border:"none",borderRadius:10,color:c.bg,fontSize:14,fontWeight:700,cursor:"pointer"}}>
                  배팅 생성
                </button>
              </div>
            </div>

            {/* 진행중 배팅 정산 */}
            {bets.filter(b=>b.status!=="settled").length>0&&(
              <div>
                <div style={{fontSize:11,color:c.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>정산 / 마감 관리</div>
                {bets.filter(b=>b.status!=="settled").map(bet=>{
                  const partCount = bet.participants ? Object.keys(bet.participants).length : 0;
                  return (
                    <div key={bet.id} style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:12,padding:"14px",marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                        <div style={{fontSize:14,fontWeight:700,color:c.text,flex:1,paddingRight:8}}>{bet.title}</div>
                        <button onClick={()=>{ if(window.confirm("이 배팅을 삭제할까요?")) deleteBet(bet); }}
                          style={{padding:"3px 10px",background:`${c.error}15`,border:`1px solid ${c.error}33`,borderRadius:6,color:c.error,fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>
                          🗑️
                        </button>
                      </div>
                      <div style={{fontSize:12,color:c.muted,marginBottom:10}}>참여 {partCount}명 · {bet.status==="open"?"진행중":"마감됨"}</div>
                      {bet.status==="open"&&(
                        <button onClick={()=>closeBet(bet)} style={{width:"100%",padding:"7px",background:"none",border:`1px solid ${c.error}44`,borderRadius:8,color:c.error,fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:8}}>
                          🔒 배팅 마감
                        </button>
                      )}
                      <div style={{fontSize:12,color:c.muted,marginBottom:6}}>결과 선택 → 자동 정산:</div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>settleBet(bet,"yes")} style={{flex:1,padding:"8px",background:`${c.success}15`,border:`1px solid ${c.success}44`,borderRadius:8,color:c.success,fontSize:13,fontWeight:700,cursor:"pointer"}}>YES 정산</button>
                        <button onClick={()=>settleBet(bet,"no")}  style={{flex:1,padding:"8px",background:`${c.error}15`,border:`1px solid ${c.error}44`,borderRadius:8,color:c.error,fontSize:13,fontWeight:700,cursor:"pointer"}}>NO 정산</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* 배팅 모달 */}
      {betModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:500}} onClick={()=>setBetModal(null)}>
          <div style={{background:c.surface,border:`1px solid ${c.border}`,borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,animation:"slideUp 0.25s ease",maxHeight:"90vh",overflowY:"auto",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",color:"#eef2ff",position:"relative",zIndex:101}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{betModal.title}</div>
            <div style={{fontSize:12,color:c.muted,marginBottom:16}}>내 코인: 🪙 {fmtCoins(user.coins)}</div>

            <div style={{fontSize:11,color:c.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>선택</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[{key:"yes",label:"YES",odds:betModal.yesOdds},{key:"no",label:"NO",odds:betModal.noOdds}].map(opt=>(
                <button key={opt.key} onClick={()=>setBetChoice(opt.key)}
                  style={{flex:1,padding:"12px",border:`1.5px solid ${betChoice===opt.key?c.bet:c.border}`,borderRadius:10,background:betChoice===opt.key?`${c.bet}20`:"none",color:betChoice===opt.key?c.bet:c.muted,cursor:"pointer",fontWeight:700,fontSize:15}}>
                  {opt.label} <span style={{fontSize:12,fontWeight:400}}>{opt.odds}배</span>
                </button>
              ))}
            </div>

            <div style={{fontSize:11,color:c.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>배팅 금액</div>
            <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
              {[100,500,1000].filter(v=>v<=(user.coins||0)).map(v=>(
                <button key={v} onClick={()=>setBetAmount(v)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${betAmount===v?c.bet:c.border}`,background:betAmount===v?`${c.bet}20`:"none",color:betAmount===v?c.bet:c.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                  {v.toLocaleString()}
                </button>
              ))}
              <button onClick={()=>setBetAmount(user.coins||0)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${betAmount===(user.coins||0)?c.bet:c.border}`,background:betAmount===(user.coins||0)?`${c.bet}20`:"none",color:betAmount===(user.coins||0)?c.bet:c.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                전액 ({(user.coins||0).toLocaleString()})
              </button>
            </div>
            <input type="number" value={betAmount} min={1} max={user.coins||0} step={50}
              onChange={e=>setBetAmount(Number(e.target.value))}
              style={{width:"100%",padding:"10px 12px",background:c.surface2,border:`1px solid ${c.border}`,borderRadius:8,color:c.text,fontSize:14,outline:"none",marginBottom:14}}/>

            {betChoice && (
              <div style={{fontSize:12,color:c.muted,marginBottom:12,textAlign:"center"}}>
                적중 시 예상 수령: <strong style={{color:c.bet}}>🪙 {Math.floor(betAmount*(betChoice==="yes"?betModal.yesOdds:betModal.noOdds)).toLocaleString()}</strong>
              </div>
            )}

            <button onClick={()=>placeBet(betModal)} disabled={syncing||!betChoice}
              style={{width:"100%",padding:"13px",background:(!betChoice||syncing)?c.muted:`linear-gradient(135deg,${c.bet},${c.bet}bb)`,border:"none",borderRadius:12,color:c.bg,fontSize:15,fontWeight:700,cursor:(!betChoice||syncing)?"not-allowed":"pointer"}}>
              {syncing?"처리 중...":`🎰 ${betAmount.toLocaleString()}코인 배팅`}
            </button>
          </div>
        </div>
      )}

      {msg && (
        <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:c.surface2,border:`1px solid ${msg.ok?c.success+"55":c.error+"55"}`,borderRadius:10,padding:"10px 20px",fontSize:14,color:msg.ok?c.success:c.error,zIndex:200,whiteSpace:"nowrap",boxShadow:"0 4px 20px #00000044"}}>
          {msg.text}
        </div>
      )}
    </div>
  );
}
